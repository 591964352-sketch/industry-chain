<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jack唐的投研看板</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #1f2233; --border: #2a2d3a;
    --text: #e1e4eb; --muted: #8b8fa3; --accent: #f0b90b;
    --green: #0ecb81; --red: #f6465d; --blue: #3b82f6; --purple: #a855f7;
    --barrier-extreme: #f6465d; --barrier-high: #f97316; --barrier-mid: #eab308; --barrier-low: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh; display: flex; }
  .container { max-width: 100%; margin: 0; padding: 20px 32px; }

  /* Sidebar */
  .sidebar { width: 230px; min-width: 230px; height: 100vh; position: sticky; top: 0; background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; display: flex; flex-direction: column; z-index: 100; }
  .sidebar-title { font-size: 17px; font-weight: 800; padding: 8px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 8px; color: var(--text); letter-spacing: 1px; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 0; }
  .sidebar-nav .nav-item { display: block; padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); text-decoration: none; border-left: 3px solid transparent; transition: all 0.15s; }
  .sidebar-nav .nav-item:hover { color: var(--text); background: rgba(240,185,11,0.04); border-left-color: rgba(240,185,11,0.3); }
  .sidebar-nav .nav-item.active { color: var(--accent); background: rgba(240,185,11,0.08); border-left-color: var(--accent); font-weight: 600; }
  .sidebar-nav .nav-item.coming { opacity: 0.35; cursor: default; font-style: italic; }
  .sidebar-nav .nav-item.coming:hover { border-left-color: transparent; background: transparent; color: var(--muted); }

  /* Header */
  .header { text-align: center; padding: 48px 24px 36px; margin-bottom: 24px; background: linear-gradient(180deg, rgba(240,185,11,0.05) 0%, transparent 100%); border-bottom: 1px solid var(--border); }
  .header h1 { font-size: 32px; font-weight: 800; }

  /* Main content area */
  .main-area { flex: 1; min-width: 0; }

  /* Sections */
  .section { margin-bottom: 44px; scroll-margin-top: 70px; }
  .section-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-title .num { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 8px; font-size: 15px; font-weight: 700; }
  .section-desc { color: var(--muted); font-size: 13px; margin-bottom: 22px; margin-left: 44px; }
  .num-plain{background:rgba(59,130,246,0.15);color:var(--blue)}.num-macro{background:rgba(168,85,247,0.15);color:var(--purple)}.num-chain{background:rgba(240,185,11,0.15);color:var(--accent)}.num-up{background:rgba(246,70,93,0.15);color:var(--red)}.num-mid{background:rgba(249,115,22,0.15);color:var(--barrier-high)}.num-ser{background:rgba(168,85,247,0.15);color:var(--purple)}.num-result{background:rgba(14,203,129,0.15);color:var(--green)}

  /* Cards */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 18px; }
  .card-header { font-size: 17px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

  /* Plain intro */
  .plain-box { background: linear-gradient(135deg, rgba(59,130,246,0.05) 0%, rgba(168,85,247,0.03) 100%); border: 1px solid rgba(59,130,246,0.18); border-radius: 12px; padding: 28px; margin-bottom: 20px; }
  .plain-box .analogy { font-size: 16px; color: var(--blue); font-weight: 600; margin-bottom: 14px; }
  .plain-box p { margin-bottom: 12px; font-size: 14px; line-height: 1.9; }
  .plain-box .flow-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; font-size: 13px; margin: 14px 0; padding: 14px; background: rgba(0,0,0,0.25); border-radius: 8px; overflow-x: auto; }
  .flow-row .step { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; white-space: nowrap; font-size: 12px; color: var(--text); }
  .flow-row .arrow { color: var(--muted); font-weight: 700; }
  .highlight-box { background: rgba(240,185,11,0.05); border-left: 3px solid var(--accent); padding: 14px 18px; border-radius: 0 8px 8px 0; font-size: 13px; margin-top: 14px; line-height: 1.8; }

  /* Overview */
  .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .overview-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; text-align: center; }
  .overview-item .label { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; margin-bottom: 8px; }
  .overview-item .value { font-size: 20px; font-weight: 700; }

  /* Tree */
  .tree-wrapper { overflow-x: auto; padding: 30px 0; }
  .tree { min-width: 950px; display: flex; flex-direction: column; align-items: center; gap: 0; position: relative; }
  .tree-level-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; margin: 8px 0 4px; text-transform: uppercase; }
  .tree-node { padding: 12px 24px; border-radius: 10px; font-weight: 600; font-size: 14px; border: 2px solid var(--border); text-align: center; display: inline-block; background: linear-gradient(135deg, rgba(26,29,39,0.9) 0%, rgba(31,34,51,0.9) 100%); backdrop-filter: blur(10px); transition: all 0.3s; }
  .tree-node:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .tree-vline { width: 2px; height: 20px; background: linear-gradient(180deg, var(--border) 0%, rgba(42,45,58,0.3) 100%); margin: 0 auto; }
  .tree-vline-dash { width: 2px; height: 16px; margin: 0 auto; background: repeating-linear-gradient(180deg, var(--border) 0px, var(--border) 4px, transparent 4px, transparent 8px); }
  .tree-hline { height: 2px; background: var(--border); margin: 0 auto; border-radius: 2px; }
  .tree-sub-node { padding: 9px 18px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%); text-align: center; transition: all 0.2s; }
  .tree-sub-node:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,0.2); }
  .b-extreme { border-color: var(--barrier-extreme) !important; box-shadow: 0 0 16px rgba(246,70,93,0.18); }
  .b-extreme:hover { box-shadow: 0 0 24px rgba(246,70,93,0.28); }
  .b-high { border-color: var(--barrier-high) !important; }
  .b-mid { border-color: var(--barrier-mid) !important; }
  .b-low { border-color: var(--barrier-low) !important; }
  .b-choke { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(240,185,11,0.25); animation: chokeGlow 2.5s ease-in-out infinite; }
  @keyframes chokeGlow {
    0%, 100% { box-shadow: 0 0 16px rgba(240,185,11,0.18); }
    50% { box-shadow: 0 0 28px rgba(240,185,11,0.35); }
  }
  /* 数据更新高亮 */
  mark.updated { background: rgba(14,203,129,0.2); color: var(--green); padding: 1px 4px; border-radius: 3px; font-weight: 600; }
  .change-badge { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 3px; }
  .change-badge.up { background: rgba(14,203,129,0.15); color: var(--green); }
  .change-badge.down { background: rgba(246,70,93,0.15); color: var(--red); }
  tr.major-change { background: rgba(240,185,11,0.06) !important; border-left: 3px solid var(--accent); }
  tr.major-change td:first-child::before { content: "⚡ "; }
  .freshness-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); padding: 6px 0; }
  .freshness-dot { width: 8px; height: 8px; border-radius: 50%; }
  .freshness-dot.fresh { background: var(--green); box-shadow: 0 0 6px rgba(14,203,129,0.5); }
  .freshness-dot.stale { background: var(--barrier-high); }
  /* 右侧浮动变更面板 */
  .changelog-panel { position: fixed; right: 0; top: 80px; width: 280px; max-height: 70vh; background: var(--card); border: 1px solid var(--border); border-right: none; border-radius: 12px 0 0 12px; box-shadow: -4px 4px 24px rgba(0,0,0,0.4); z-index: 200; overflow-y: auto; transition: transform 0.3s ease; }
  .changelog-panel.collapsed { transform: translateX(260px); }
  .changelog-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--card); border-radius: 12px 0 0 0; }
  .changelog-header h3 { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .changelog-header .count-badge { background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .changelog-close { background: none; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px 8px; border-radius: 4px; }
  .changelog-close:hover { color: var(--text); border-color: var(--red); }
  .changelog-list { padding: 8px 0; }
  .changelog-item { padding: 10px 16px; border-bottom: 1px solid rgba(42,45,58,0.5); font-size: 12px; line-height: 1.6; cursor: pointer; transition: background 0.15s; }
  .changelog-item:hover { background: var(--card2); }
  .changelog-item .cl-date { font-size: 10px; color: var(--muted); }
  .changelog-item .cl-sector { font-size: 10px; color: var(--blue); margin-bottom: 2px; }
  .changelog-item .cl-desc { font-weight: 500; }
  .changelog-item .cl-change { font-size: 11px; margin-top: 2px; }
  .cl-toggle { position: fixed; right: 6px; top: 80px; z-index: 199; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px; cursor: pointer; font-size: 14px; transition: transform 0.3s ease; }
  .cl-toggle.hidden { transform: translateX(300px); }
  .cl-toggle .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; animation: chokeGlow 2s ease-in-out infinite; margin-right: 4px; }
  .badge-b { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-left: 4px; }
  .badge-ex { background: rgba(246,70,93,0.15); color: var(--barrier-extreme); }
  .badge-hi { background: rgba(249,115,22,0.15); color: var(--barrier-high); }
  .badge-mi { background: rgba(234,179,8,0.15); color: var(--barrier-mid); }
  .badge-lo { background: rgba(107,114,128,0.15); color: var(--barrier-low); }
  .legend-bar { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; margin-top: 18px; font-size: 12px; color: var(--muted); }
  .legend-bar span { display: flex; align-items: center; gap: 5px; }
  .legend-bar .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  /* Segment card */
  .segment-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 20px; }
  .segment-card .seg-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .segment-card .seg-meta { font-size: 12px; color: var(--muted); margin-bottom: 16px; display: flex; gap: 20px; flex-wrap: wrap; }
  .segment-card h4 { font-size: 14px; font-weight: 600; color: var(--text); margin: 18px 0 10px; padding-left: 10px; border-left: 3px solid var(--border); }
  .segment-card .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .segment-card .info-item { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .segment-card .info-item .lbl { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .segment-card .info-item .val { font-size: 15px; font-weight: 600; }

  /* Stock table */
  .stock-tbl { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 14px; }
  .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stock-tbl thead th { text-align: left; padding: 11px 14px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; background: var(--card2); }
  .stock-tbl tbody td { padding: 11px 14px; border-bottom: 1px solid rgba(42,45,58,0.5); }
  .stock-tbl .s-name { font-weight: 600; font-size: 14px; }
  .stock-tbl .s-code { color: var(--muted); font-size: 12px; font-family: "SF Mono", monospace; }
  .rank-num { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 6px; font-size: 12px; font-weight: 700; background: rgba(240,185,11,0.1); color: var(--accent); }

  .tag { display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 4px; font-weight: 600; }
  .tg-extreme{background:rgba(246,70,93,0.15);color:var(--red)}.tg-high{background:rgba(249,115,22,0.15);color:var(--barrier-high)}.tg-mid{background:rgba(234,179,8,0.15);color:var(--barrier-mid)}.tg-green{background:rgba(14,203,129,0.15);color:var(--green)}.tg-blue{background:rgba(59,130,246,0.15);color:var(--blue)}.tg-gray{background:rgba(107,114,128,0.12);color:var(--barrier-low)}

  /* Four question table */
  .fourq-wrap { overflow-x: auto; }
  .fourq-tbl { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
  .fourq-tbl thead th { position: sticky; top: 0; background: var(--card2); padding: 10px 8px; text-align: center; border-bottom: 2px solid var(--border); font-size: 11px; color: var(--muted); white-space: nowrap; }
  .fourq-tbl thead th:first-child { text-align: left; }
  .fourq-tbl tbody td { padding: 9px 8px; text-align: center; border-bottom: 1px solid rgba(42,45,58,0.5); white-space: nowrap; }
  .fourq-tbl tbody td:first-child { text-align: left; }
  .fourq-tbl .pass { color: var(--green); font-weight: 700; font-size: 14px; }
  .fourq-tbl .fail { color: var(--red); font-weight: 700; font-size: 14px; }
  .fourq-tbl .seg-div td { background: rgba(168,85,247,0.05); color: var(--purple); font-weight: 700; font-size: 12px; text-align: left !important; padding: 12px 8px; border-bottom: 1px solid rgba(168,85,247,0.15); }
  .hit-dot { display: inline-block; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; font-weight: 700; font-size: 13px; }
  .h4{background:rgba(14,203,129,0.15);color:var(--green)}.h3{background:rgba(234,179,8,0.15);color:var(--barrier-mid)}.h2{background:rgba(107,114,128,0.12);color:var(--muted)}.h1{background:rgba(107,114,128,0.1);color:var(--barrier-low)}.h0{background:rgba(246,70,93,0.08);color:var(--red)}
  .stars { font-size: 14px; letter-spacing: 1px; }
  .s3{color:var(--accent)}.s2{color:var(--barrier-mid)}

  /* Choke cards */
  .choke-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .choke-card { background: var(--card); border: 1px solid rgba(240,185,11,0.35); border-radius: 12px; padding: 24px; position: relative; box-shadow: 0 0 24px rgba(240,185,11,0.06); }
  .choke-card .rank { position: absolute; top: -12px; right: 18px; background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 12px; }
  .choke-card h3 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .choke-card .code { font-size: 13px; color: var(--muted); margin-bottom: 12px; font-family: monospace; }
  .choke-card .seg { font-size: 12px; color: var(--accent); margin-bottom: 12px; font-weight: 600; }
  .choke-card .logic { font-size: 13px; line-height: 1.8; color: var(--text); margin-bottom: 14px; }
  .choke-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }

  /* 升级六：mobile 适配辅助 class（决策卡片网格 + 周期进度条 + 交易日志表格） */
  .decision-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
  .cycle-stage { flex: 1; padding: 10px 6px; border-radius: 6px; text-align: center; font-size: 12px; transition: all 0.2s; }
  .trade-table { font-size: 12px; }

  /* Footer */
  .footer { text-align: center; padding: 28px; margin-top: 28px; border-top: 1px solid var(--border); }
  .footer .disclaimer { background: rgba(246,70,93,0.05); border: 1px solid rgba(246,70,93,0.15); border-radius: 8px; padding: 18px; font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.9; text-align: left; }
  .footer .meta { font-size: 11px; color: var(--muted); }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; min-width: 100%; height: auto; position: relative; border-right: none; border-bottom: 2px solid var(--border); padding: 10px 0; flex-shrink: 0; }
    .sidebar-title { font-size: 15px; padding: 6px 14px 10px; }
    .sidebar-nav { display: flex; flex-wrap: wrap; gap: 2px; padding: 4px 8px; }
    .sidebar-nav .nav-item { font-size: 11px; padding: 6px 10px; border-left: none; border-radius: 6px; white-space: nowrap; }
    .sidebar-nav .nav-item.active { border-left: none; background: rgba(240,185,11,0.15); }
    .main-area { width: 100%; }
    .container { padding: 10px 12px; }
    .header { padding: 20px 12px 18px; }
    .header h1 { font-size: 19px; }
    .header .subtitle { font-size: 12px; }
    .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .overview-item { padding: 12px 10px; }
    .overview-item .value { font-size: 16px; }
    .choke-grid { grid-template-columns: 1fr; }
    .choke-card { padding: 16px; }
    .choke-card h3 { font-size: 18px; }
    .section-title { font-size: 17px; }
    .section { margin-bottom: 28px; }
    .card { padding: 14px; }
    .segment-card { padding: 16px; }
    .segment-card .seg-title { font-size: 15px; }
    .info-grid { grid-template-columns: 1fr 1fr; }
    /* Tables: horizontal scroll on mobile */
    .stock-tbl, .fourq-tbl { font-size: 11px; }
    .stock-tbl thead th, .stock-tbl tbody td { padding: 7px 6px; }
    .fourq-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .fourq-tbl { min-width: 650px; }
    /* All cards/tables scrollable on mobile */
    .card, .segment-card { overflow-x: auto; }
    /* Tree: compact */
    .tree { min-width: auto; }
    .tree-node { font-size: 12px; padding: 8px 14px; min-width: auto !important; }
    .tree-sub-node { font-size: 10px; padding: 6px 10px; min-width: auto !important; }
    .tree-level-label { font-size: 10px; }
    /* Changelog panel */
    .changelog-panel { width: 240px; top: 40px; font-size: 11px; display: none; }
    .cl-toggle { top: 40px; right: 4px; }
    /* Socratic cards */
    .socratic-card { padding: 10px 12px; }
    .plain-box { padding: 16px; }
    .plain-box .flow-row { padding: 8px; gap: 3px; }
    .plain-box .flow-row .step { font-size: 10px; padding: 3px 8px; }
    .highlight-box { font-size: 11px; padding: 10px 14px; }
    /* Legend */
    .legend-bar { gap: 10px; font-size: 10px; }
    /* Footer */
    .footer .disclaimer { font-size: 10px; padding: 12px; }
  }

  /* Small phone: <= 480px */
  @media (max-width: 480px) {
    .sidebar-nav .nav-item { font-size: 10px; padding: 5px 7px; }
    .header h1 { font-size: 17px; }
    .overview-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
    .overview-item { padding: 8px 6px; }
    .overview-item .value { font-size: 13px; }
    .overview-item .label { font-size: 10px; }
    .info-grid { grid-template-columns: 1fr; }
    .changelog-panel { display: none !important; }
    .cl-toggle { display: none !important; }
    /* 升级六：mobile 适配（5 项升级加的 inline grid/flex 在 480px 下覆盖） */
    .decision-grid { grid-template-columns: 1fr; gap: 14px; }   /* 决策卡片 2列→1列 */
    .cycle-stage { padding: 8px 4px; font-size: 11px; }        /* 周期进度条更紧凑 */
    .choke-card { padding: 14px; }                              /* choke-card 再省 2px */
    .choke-card h3 { font-size: 16px; }                         /* h3 降到 16px 腾空间 */
    .trade-table { font-size: 10px; }                           /* 交易日志 9 列表更紧 */
    .trade-table th, .trade-table td { padding: 6px 4px; }      /* 9 列表格 padding 收紧 */
  }

  /* ===== 升级七：5 列树状图布局（破例 0 CSS 增量，append 到主结构末尾）===== */
  .tree-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .tree-col { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .tree-col-title { font-size: 12px; font-weight: 700; color: var(--accent); padding: 6px 0; border-bottom: 2px solid var(--border); margin-bottom: 6px; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
  .tree-col-count { font-size: 10px; color: var(--muted); font-weight: 500; margin-left: 4px; }
  .tree-legend-sticky { position: sticky; top: 0; z-index: 5; background: var(--card); padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; font-size: 11px; color: var(--muted); }

<script>
// ================================================================
// DATA LAYER
// ================================================================
const CHAINS = {};

// ==================== 本地持久化助手（升级一：卡口验证状态用） ====================
const LS = {
  get(key, def) {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : def; }
    catch(e) { console.warn('LS.get parse fail', key, e); return def; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); }
    catch(e) { console.warn('LS.set fail', key, e); }
  }
};
const LS_KEYS = {
  verify: (chainId, code) => `verify_${chainId}_${code}`,
  cards: 'myCards',
  trades: 'myTrades',
  customChains: 'myCustomChains',   // ★ 升级六：侧栏"+ 新建空模板赛道"
  sidebarCollapsed: 'sidebarCollapsed'  // ★ 升级八 Step 2：侧栏折叠状态
};

// ==================== 升级九 · 景气六维框架（全站共享基础设施） ====================
// 依据：景气六维_SOP试水样板_PCB.md（v3 · 2026-06-12）
// STEP 1：只新增 3 个全站共享对象，不动任何赛道数据/渲染，页面零可见变化
// 所有六维评分均为 🆪 AI 主观判断，cron 不刷顶部"数据截止"日期

// —— 6 维定义+标尺+依据（全站一份；渲染时供 ⓘ tooltip 展开 define/scale/basis）—— 样板 §2.1 原文
const PROSPERITY_META = {
  durability: {
    name: '景气持续性',
    define: '本轮上行能持续多久——看周期位置 + 需求增速相对行业均速的超额。',
    scale: { 5:'多年超级周期、需求 CAGR ≫ 行业均速', 3:'温和复苏 / 结构分化', 1:'周期下行' },
    basis: '依据：cyclePosition + 下游 CAGR vs 行业均速（Prismark/券商）。'
  },
  visibility: {
    name: '业绩可见度',
    define: '景气是否已落到报表——头部最近财报兑现度 + 订单/长协可见性。',
    scale: { 5:'头部已兑现 + 长协锁单', 3:'部分兑现、预期为主', 1:'纯主题、未盈利' },
    basis: '依据：上市公司最近年报/季报营收净利同比 + 在手订单/扩产长协公告。'
  },
  policy: {
    name: '政策确定性',
    define: '国家政策的扶持强度与确定性——专项/大基金/规划倾斜 vs 无政策或逆风。',
    scale: { 5:'国家专项直补 + 卡脖子重点', 3:'方向受益、非直补', 1:'无政策 / 有逆风' },
    basis: '依据：十五五倾斜、大基金、02 专项、国产替代主体地位。'
  },
  supply: {
    name: '供需紧张度',
    define: '供需格局松紧——缺口/涨价/长协锁死 vs 过剩内卷；区分结构性紧张。',
    scale: { 5:'全面缺货 / 涨价 / 长协锁死', 3:'结构性紧（高端紧低端松）', 1:'普遍过剩内卷' },
    basis: '依据：缺口测算、涨价函、长协公告、产能利用率。'
  },
  valuation: {
    name: '估值性价比',
    define: '当前价位的安全度（方向已翻转：分越高越便宜）——PE 历史分位。',
    scale: { 5:'PE 分位 < 30%', 3:'分位 30–70%', 1:'分位 > 80%、严重透支' },
    basis: '依据：roll-up 自 chokePoints[].valuation.pePercentile / 个股自身 PE 分位。'
  },
  barrier: {
    name: '壁垒安全垫',
    define: '护城河深度——核心环节寡头/认证壁垒 vs 无壁垒纯成本竞争。',
    scale: { 5:'核心环节 T0 寡头 + 认证', 3:'中高、可替代', 1:'无壁垒、纯成本竞争' },
    basis: '依据：roll-up 自 segments[].barrier + 卡口 strength / 个股自身 barrier。'
  }
};

// —— 长线适配度综合分（针对 1–2 年持有；权重可调，但全站统一一处，30+ 条链同步生效）—— 样板 §8.1 原文
// 安全垫门控：估值或壁垒 ≤1 → 封顶 60 并标 risk（防"景气爆表但泡沫/无护城河"冲榜首）
function computeLtFit(prosperity){
  const w = { durability:0.25, visibility:0.25, valuation:0.20, supply:0.12, barrier:0.10, policy:0.08 };
  const s = Object.fromEntries(prosperity.dims.map(d=>[d.key, d.score]));
  let score = Object.entries(w).reduce((a,[k,wk])=> a + (s[k]||0)/5*wk, 0) * 100; // 0-100
  let risk = (s.valuation<=1 || s.barrier<=1);
  if (risk) score = Math.min(score, 60);
  let tier = score>=75 ? {k:'core',label:'🟢核心'} : score>=55 ? {k:'watch',label:'🟡观察'} : {k:'avoid',label:'🔴回避/等'};
  return { score: Math.round(score), tier: tier.label, risk };
}

// —— 跨链重复个股 canonical 注册表（先留空壳留钩子，20+ 条链时正式收口）—— 样板 §8.3
// 用法：渲染时若 stock.dims6 缺省，回退 STOCK_REGISTRY[code].dims6；二者都有则校验一致，不一致 console.warn
const STOCK_REGISTRY = {};

// 验证状态推导
function loadVerifyStatus(chainId, code, type) {
  return LS.get(LS_KEYS.verify(chainId, code), {})[type] || 'pending';
}
function collectVerifyStatuses(chainId, code, items) {
  const map = LS.get(LS_KEYS.verify(chainId, code), {});
  return items.map(it => map[it.type] || it.status || 'pending');
}
function computeOverallStatus(statuses) {
  if (!statuses || !statuses.length) return 'pending';
  if (statuses.some(s => s === 'broken')) return 'falsified';
  if (statuses.every(s => s === 'confirmed')) return 'verified';
  return 'pending';
}
function cycleVerifyStatus(chainId, code, type, el) {
  const key = LS_KEYS.verify(chainId, code);
  const map = LS.get(key, {});
  const cur = map[type] || 'pending';
  const next = cur === 'pending' ? 'confirmed' : cur === 'confirmed' ? 'broken' : 'pending';
  map[type] = next;
  LS.set(key, map);
  // 局部更新这一格 tag（不重渲染整个赛道，避免 <details> 关闭、滚动位置丢失）
  const cls = next==='confirmed'?'tg-green':next==='broken'?'tg-extreme':'tg-gray';
  const txt = next==='confirmed'?'✅ 已通过':next==='broken'?'❌ 已证伪':'⏳ 待验证';
  el.className = 'tag ' + cls;
  el.textContent = txt;
  // 顶部整体徽章联动
  const card = el.closest('.choke-card');
  const badge = card && card.querySelector('.verify-overall');
  if (badge) {
    const all = Object.values(map);
    const ov = computeOverallStatus(all.length ? all : ['pending']);
    const ocls = ov==='verified'?'tg-green':ov==='falsified'?'tg-extreme':'tg-gray';
    const otxt = ov==='verified'?'✅ 已验证':ov==='falsified'?'❌ 已证伪':'⏳ 待验证';
    badge.className = 'tag verify-overall ' + ocls;
    badge.textContent = otxt;
  }
}

// ==================== 决策卡片业务函数（升级四） ====================
function loadCards() { return LS.get(LS_KEYS.cards, []); }
function saveCards(arr) { LS.set(LS_KEYS.cards, arr); }

function addToDecisionCard(chainId, code) {
  const all = loadCards();
  if (all.some(c => c.chain === chainId && c.code === code)) {
    alert('已存在该标的的决策卡片（按 code 去重）');
    return;
  }
  const src = ((CHAINS[chainId] || {}).chokePoints) || [];
  const c = src.find(x => x.code === code);
  if (!c) { alert('找不到该卡口标的'); return; }
  const now = new Date().toISOString().slice(0, 10);
  all.push({
    id: `${chainId}_${code}_${Date.now()}`,
    chain: chainId,
    chainName: ((CHAINS[chainId] || {}).name) || chainId,
    code: c.code, name: c.name,
    segment: c.segment || '',
    strength: c.strength || null,
    logic: c.logic || '',
    tags: c.tags || [],
    valuation: c.valuation || null,
    verification: c.verification || null,
    whyWatch: '', grade: c.strength || '',
    pePercentile: (c.valuation && typeof c.valuation.pePercentile === 'number') ? c.valuation.pePercentile : null,
    grossMargin: (c.valuation && c.valuation.grossMargin) || '',
    valuationNote: '',
    buyLogic: '', sellConditions: '', trackSignals: [],
    chokeBreakSignal: '',
    reviews: [],
    status: 'watching',
    createdAt: now, updatedAt: now
  });
  saveCards(all);
  window.location.hash = 'cards';
}

function removeCard(id) {
  if (!confirm('确定要删除这张决策卡片吗？此操作不可恢复。')) return;
  saveCards(loadCards().filter(c => c.id !== id));
  renderCards();
}

function updateCard(id, patch) {
  const all = loadCards();
  const idx = all.findIndex(c => c.id === id);
  if (idx < 0) return;
  all[idx] = { ...all[idx], ...patch, updatedAt: new Date().toISOString().slice(0, 10) };

  methodologyNotes: 'AI全产业链是四层方法论（苏格拉底提问→第一性原理→奥卡姆剃刀→Serenity物理卡口）的完整演练场。最大收获不是"找到10个卡口标的"，而是明确了<strong>方法论的有效边界</strong>：①最核心的物理卡口（GPU/HBM/CoWoS/EUV）均不在A股→A股只能抓卖铲人+材料商+组件卡口；②奥卡姆剃刀砍掉了80%的"优秀但非卡口"标的（中际旭创/胜宏科技/沪电股份/工业富联都是好公司但不是卡口）；③苏格拉底六问揭示了最大的风险——铜连接448G突破可能推迟CPO大规模部署、ASIC蚕食GPU份额、Scaling Law见顶可能导致训练集群需求断崖。投资时需在"物理卡口的高确定性"和"技术替代的风险"之间取得平衡。详见各子赛道（PCB/半导体/AI服务器/HBM/CPO/AI应用）的独立分析。'
};

let currentChain = 'pcb';

function switchChain(chainId) {
  // ★ 升级四：决策卡片库 / 交易日志走独立路由，不进 renderChain
  if (chainId === 'cards' || chainId === 'trades') {
    if (chainId === 'cards') renderCards();
    if (chainId === 'trades') renderTrades();   // ★ 升级五
    return;
  }
  currentChain = chainId;
  // Update sidebar nav
  document.querySelectorAll('#nav-list .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.chain === chainId);
  });
  // Render
  renderChain(chainId);
  window.location.hash = chainId;
  document.getElementById('chain-content').scrollIntoView({ behavior: 'smooth' });
}

function renderChain(chainId) {
  const d = CHAINS[chainId];
  if (!d) return;
  const container = document.getElementById('chain-content');
  let h = '';

  // ===== 升级 B：个股趋势徽章（绿/红/灰，复用 .tag .tg-* 零 CSS 增量） =====
  function trendBadge(t, note) {
    const title = note ? ` title="${note}"` : '';
    if (t === 'up')   return ` <span class="tag tg-green"${title}>⬆ 进步</span>`;
    if (t === 'down') return ` <span class="tag tg-extreme"${title}>⬇ 承压</span>`;
    if (t === 'flat') return ` <span class="tag tg-gray"${title}>➖ 平稳</span>`;
    return '';
  }

  // ===== 升级九 STEP 2B：个股六维 mini-bar 展开（native <details>，0 JS、0 CSS 增量） =====
  function stockDims6Badge(s) {
    if (!s.dims6 || !s.dims6.length) return '';
    const META = (typeof PROSPERITY_META !== 'undefined') ? PROSPERITY_META : {};
    const arrow = t => t==='up' ? '<span style="color:var(--green);">↑</span>' : t==='down' ? '<span style="color:var(--red);">↓</span>' : '<span style="color:var(--muted);">→</span>';
    let bars = '';
    s.dims6.forEach(d6 => {
      const meta = META[d6.key] || {};
      const pct = Math.max(0, Math.min(100, (d6.score/5)*100));
      const barColor = d6.score >= 4 ? 'var(--green)' : d6.score >= 3 ? 'var(--barrier-high)' : d6.score >= 2 ? 'var(--barrier-mid)' : 'var(--red)';
      bars += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px;line-height:1.4;">`;
      bars += `<span style="width:68px;color:var(--muted);flex-shrink:0;">${meta.name || d6.key}</span>`;
      bars += `<div style="flex:1;min-width:50px;height:4px;background:var(--card2);border-radius:2px;overflow:hidden;"><div style="width:${pct}%;height:100%;background:${barColor};"></div></div>`;
      bars += `<span style="width:42px;text-align:right;font-family:monospace;flex-shrink:0;">${d6.score}/5 ${arrow(d6.trend)}</span>`;
      bars += `</div>`;
    });
    return ` <details style="display:inline-block;margin-left:6px;font-size:11px;font-weight:400;vertical-align:middle;"><summary style="cursor:pointer;display:inline-block;padding:2px 8px;background:rgba(240,185,11,0.08);border:1px solid rgba(240,185,11,0.35);border-radius:10px;color:var(--accent);font-weight:600;">🆪 六维 ▾</summary><div style="margin-top:6px;padding:8px 10px;background:var(--card2);border-radius:6px;min-width:240px;">${bars}${s.dims6Note?`<div style="margin-top:6px;font-size:11px;color:var(--text);line-height:1.6;padding-top:6px;border-top:1px dashed var(--border);">${s.dims6Note}</div>`:''}</div></details>`;
  }


  // ===== AI全产业链专属：Section ⓪ 苏格拉底六问 =====
  if (d.socraticInquiry) {
    h += `<div class="section"><div class="section-title"><span class="num num-plain">⓪</span> 苏格拉底六问 — 追问 AI 产业链的「常识」</div>`;
    h += `<div class="section-desc">${d.socraticInquiry.intro}</div>`;
    h += `<div class="card" style="padding:20px;">`;
    d.socraticInquiry.questions.forEach(q => {
      h += `<div style="margin-bottom:18px;padding:14px 18px;background:var(--card2);border-radius:8px;border-left:3px solid var(--blue);">`;
      h += `<div style="font-size:12px;color:var(--blue);font-weight:700;margin-bottom:6px;">${q.step}</div>`;
      h += `<div style="font-weight:600;margin-bottom:4px;font-size:14px;">${q.question}</div>`;
      h += `<div style="font-size:12px;color:var(--muted);">💬 ${q.challenge}</div>`;
      h += `</div>`;
    });
    h += `<div style="padding:14px 18px;background:rgba(240,185,11,0.06);border-radius:8px;border-left:3px solid var(--accent);">`;
    h += `<div style="font-weight:700;color:var(--accent);margin-bottom:4px;">🎯 六问结论</div>`;
    h += `<div style="font-size:13px;line-height:1.9;">${d.socraticInquiry.conclusion}</div>`;
    h += `</div></div></div>`;
  }

  // Section 0/1: Plain Intro
  const hasSocratic = !!d.socraticInquiry;
  const sec0Label = hasSocratic ? '①' : '⓪';
  const sec0Title = d.id === 'ai-full-chain' ? '第一性原理 — AI 算力的物理拆解' : `白话解读：${d.name}是什么？`;
  h += `<div class="section"><div class="section-title"><span class="num num-plain">${sec0Label}</span> ${sec0Title}</div>`;
  h += `<div class="plain-box"><div class="analogy">${d.icon} ${d.plainIntro.analogy}</div>`;
  d.plainIntro.paragraphs.forEach(p => h += `<p>${p}</p>`);
  h += `<div style="font-weight:600;margin-bottom:6px;font-size:13px;color:var(--muted);">🔗 产业链通俗流水账：</div><div class="flow-row">`;
  d.plainIntro.flowSteps.forEach((s, i) => {
    if (i > 0) h += '<span class="arrow">→</span>';
    h += `<span class="step">${s}</span>`;
  });
  h += `</div><div class="highlight-box">${d.plainIntro.highlightBox}</div></div></div>`;

  // Section 1/2: Overview
  const sec1Label = hasSocratic ? '②' : '①';
  h += `<div class="section"><div class="section-title"><span class="num num-macro">${sec1Label}</span> 赛道概览 — 宏观数据</div>`;
  h += `<div class="section-desc">数据来源：公开研报及行业数据交叉验证。</div><div class="overview-grid">`;
  d.overview.forEach(o => {
    h += `<div class="overview-item"><div class="label">${o.label}</div><div class="value" style="${o.color?'color:'+o.color:''}">${o.value}</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">${o.note}</div></div>`;
  });
  // ★ 升级九 STEP 2B：景气六维卡（可选字段，没填 prosperity 就不渲染；0 CSS 增量，全 inline 复用 var(--*) 调色板）
  if (d.prosperity && d.prosperity.dims && d.prosperity.dims.length === 6) {
    const p = d.prosperity;
    const META = (typeof PROSPERITY_META !== 'undefined') ? PROSPERITY_META : {};
    const arrowD = t => t==='up' ? '<span style="color:var(--green);">↑</span>' : t==='down' ? '<span style="color:var(--red);">↓</span>' : '<span style="color:var(--muted);">→</span>';
    const lt = (typeof computeLtFit === 'function') ? computeLtFit(p) : null;
    h += `<div class="card" style="padding:20px;margin-top:18px;border-left:3px solid var(--accent);">`;
    h += `<div class="card-header" style="font-size:15px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">`;
    h += `<span>🆪 景气六维 — 长线适配度<span style="color:var(--muted);font-size:11px;margin-left:8px;font-weight:400;">（AI 主观判断 · 权重全站统一 · 横向可比 · cron 不刷数据截止日）</span></span>`;
    if (lt) {
      h += `<span style="font-size:13px;">综合 <strong style="color:var(--accent);font-size:18px;">${lt.score}</strong>/100 ${lt.tier}${lt.risk?' <span style="color:var(--red);font-size:11px;">⚠安全垫不足</span>':''}</span>`;
    }
    h += `</div>`;
    p.dims.forEach(d6 => {
      const meta = META[d6.key] || {};
      const pct = Math.max(0, Math.min(100, (d6.score/5)*100));
      const barColor = d6.score >= 4 ? 'var(--green)' : d6.score >= 3 ? 'var(--barrier-high)' : d6.score >= 2 ? 'var(--barrier-mid)' : 'var(--red)';
      const scaleText = meta.scale ? Object.entries(meta.scale).map(([k,v])=>`<strong>${k}</strong>=${v}`).join('；') : '';
      h += `<div style="margin-bottom:10px;">`;
      h += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:13px;">`;
      h += `<span><strong>${d6.name || meta.name || d6.key}</strong>`;
      h += ` <details style="display:inline-block;margin-left:6px;font-size:11px;color:var(--muted);font-weight:400;vertical-align:middle;">`;
      h += `<summary style="cursor:pointer;display:inline-block;padding:1px 7px;background:rgba(123,168,255,0.10);border:1px solid rgba(123,168,255,0.35);border-radius:9px;color:var(--blue);font-weight:600;">ⓘ 依据</summary>`;
      h += `<div style="display:block;background:var(--card2);padding:10px 12px;border-radius:6px;margin-top:6px;line-height:1.7;color:var(--text);font-size:12px;max-width:680px;">`;
      if (meta.define) h += `<div><strong>定义：</strong>${meta.define}</div>`;
      if (scaleText)   h += `<div style="margin-top:4px;"><strong>标尺：</strong>${scaleText}</div>`;
      if (meta.basis)  h += `<div style="margin-top:4px;color:var(--muted);">${meta.basis}</div>`;
      if (d6.reason)   h += `<div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);"><strong>本赛道判断：</strong>${d6.reason}</div>`;
      if (d6.evidence) h += `<div style="margin-top:3px;color:var(--muted);font-size:10px;">📎 ${d6.evidence}${d6.flag?' '+d6.flag:''}</div>`;
      h += `</div></details></span>`;
      h += `<span style="font-family:monospace;color:var(--text);">${d6.score}/5 ${arrowD(d6.trend)}</span>`;
      h += `</div>`;
      h += `<div style="height:6px;background:var(--card2);border-radius:3px;overflow:hidden;">`;
      h += `<div style="width:${pct}%;height:100%;background:${barColor};transition:width .3s;"></div>`;
      h += `</div></div>`;
    });
    if (p.verdict) {
      h += `<div class="highlight-box" style="margin-top:14px;">`;
      if (p.verdict.oneLine)     h += `<div>${p.verdict.oneLine}</div>`;
      if (p.verdict.longTermFit) h += `<div style="margin-top:6px;color:var(--muted);font-size:12px;"><strong>长线适配：</strong>${p.verdict.longTermFit}</div>`;
      if (p.verdict.stockHint)   h += `<div style="margin-top:6px;color:var(--muted);font-size:12px;"><strong>选股提示：</strong>${p.verdict.stockHint}</div>`;
      h += `</div>`;
    }
    h += `</div>`;
  }
  // ★ 升级三：周期位置卡片（可选字段，没填 cyclePosition 就不渲染）
  if (d.cyclePosition && d.cyclePosition.stage) {
    const cp = d.cyclePosition;
    const stages = [
      { key:'recovery', label:'复苏' },
      { key:'boom',     label:'繁荣' },
      { key:'peak',     label:'顶部' },
      { key:'decline',  label:'下行' }
    ];
    h += `<div class="card" style="padding:20px;margin-top:18px;">`;
    h += `<div class="card-header" style="font-size:15px;margin-bottom:14px;">📍 周期位置 — <span style="color:var(--accent);">${cp.label || ''}</span></div>`;
    h += `<div style="display:flex;gap:6px;margin-bottom:14px;">`;
    stages.forEach(s => {
      const isCurrent = s.key === cp.stage;
      let bg = 'var(--card2)', fg = 'var(--muted)';
      if (isCurrent) {
        if (s.key === 'recovery')      { bg = 'var(--green)';          fg = '#0f1117'; }
        else if (s.key === 'boom')     { bg = 'var(--barrier-high)';   fg = '#0f1117'; }
        else if (s.key === 'peak')     { bg = 'rgba(246,70,93,0.4)';   fg = '#fff'; }
        else if (s.key === 'decline')  { bg = 'rgba(246,70,93,0.85)';  fg = '#fff'; }
      }
      h += `<div class="cycle-stage" style="background:${bg};color:${fg};font-weight:${isCurrent?700:500};">${s.label}</div>`;
    });
    h += `</div>`;
    if (cp.reason) {
      h += `<div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:12px;padding:10px 14px;background:var(--card2);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;">💡 ${cp.reason}</div>`;
    }
    if (cp.watchSignals && cp.watchSignals.length) {
      h += `<div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;">🔍 关注信号（判断周期是否转向）</div>`;
      h += `<ul style="margin:0;padding-left:20px;font-size:12px;color:var(--text);line-height:1.8;">`;
      cp.watchSignals.forEach(sig => { h += `<li>${sig}</li>`; });
      h += `</ul>`;
    }
    h += `</div>`;
  }
  h += `</div></div>`;

  // Section 2/3: Tree Map
  const sec2Label = hasSocratic ? '③' : '②';
  // ★ 升级七：新 schema 检测（downstream 是 array → pcb 试点）→ 用横向 5 列
  const isNewTreeMapSchema = Array.isArray(d.treeMap.downstream);

  if (isNewTreeMapSchema) {
    // ==================== 升级七：5 列横向布局（pcb 试点）====================
    h += `<div class="section"><div class="section-title"><span class="num num-chain">${sec2Label}</span> 全产业链树状图 · 横向 5 列布局</div>`;
    h += `<div class="section-desc">5 列从左到右：上游材料 → 上游设备 → 中游(制造) → 下游(需求) → 侧枝。每张 sub-card 配 3-5 家代表公司（按壁垒排序）。</div>`;
    h += `<div class="card">`;
    // sticky 图例
    h += `<div class="tree-legend-sticky">`;
    h += `<span><span class="dot" style="background:var(--barrier-extreme);"></span>极高(全球≤3家)</span>`;
    h += `<span><span class="dot" style="background:var(--barrier-high);"></span>高(认证1-2年)</span>`;
    h += `<span><span class="dot" style="background:var(--barrier-mid);"></span>中(国产突破)</span>`;
    h += `<span><span class="dot" style="background:var(--barrier-low);"></span>低(充分竞争)</span>`;
    h += `<span>🔒=物理卡口</span>`;
    h += `</div>`;
    // 5 列 grid
    h += `<div class="tree-grid">`;
    const cols = [
      { key: 'materials',     title: '上游材料' },
      { key: 'equipment',     title: '上游设备' },
      { key: 'midstream',     title: '中游(制造)' },
      { key: 'downstream',    title: '下游(需求)' },
      { key: 'sideBranches',  title: '侧枝' }
    ];
    const barrierOrder = { extreme: 0, high: 1, mid: 2, low: 3 };
    const barrierClassMap = { extreme: 'b-extreme', high: 'b-high', mid: 'b-mid', low: 'b-low' };
    const barrierLabelMap = { extreme: '极高', high: '高', mid: '中', low: '低' };
    const barrierBadgeMap = { extreme: 'badge-ex', high: 'badge-hi', mid: 'badge-mi', low: 'badge-lo' };
    cols.forEach(col => {
      const items = (d.treeMap[col.key] || []).slice().sort((a, b) => (barrierOrder[a.barrier] ?? 9) - (barrierOrder[b.barrier] ?? 9));
      h += `<div class="tree-col">`;
      h += `<div class="tree-col-title">${col.title} <span class="tree-col-count">(${items.length})</span></div>`;
      items.forEach(item => {
        const bCls = barrierClassMap[item.barrier] || 'b-low';
        const bLbl = barrierLabelMap[item.barrier] || '低';
        const bBg = barrierBadgeMap[item.barrier] || 'badge-lo';
        const chokeBadge = item.choke ? ' <span class="badge-b badge-ex">🔒 卡口</span>' : '';
        // 找公司数据：sourceSegment 优先 → segments[].stocks[]；否则 inline companies[]
        let companies = [];
        if (item.sourceSegment) {
          const seg = (d.segments || []).find(s => s.name === item.sourceSegment);
          if (seg && seg.stocks && seg.stocks.length) {
            companies = seg.stocks.slice(0, 5).map(s => ({ name: s.name, code: s.code, position: s.position, barrier: s.barrier }));
          }
        } else if (item.companies && item.companies.length) {
          companies = item.companies.slice(0, 5);
        }
        h += `<div class="tree-sub-card ${bCls}">`;
        h += `<div class="tree-sub-header"><strong>${item.name}</strong> <span class="badge-b ${bBg}">${bLbl}</span>${chokeBadge}</div>`;
        if (item.note) h += `<div class="tree-sub-note">${item.note}</div>`;
        if (companies.length) {
          h += `<table class="tree-sub-mini-tbl"><tbody>`;
          companies.forEach((c, i) => {
            h += `<tr><td class="rank-num">${i+1}</td><td class="s-name" style="font-size:11px;">${c.name}</td><td class="s-code" style="font-size:11px;">${c.code || '—'}</td><td style="font-size:11px;color:var(--muted);">${c.barrier || ''}</td></tr>`;
          });
          h += `</tbody></table>`;
        } else {
          h += `<div class="tree-sub-empty">（暂无代表公司）</div>`;
        }
        h += `</div>`;
      });
      h += `</div>`;  // tree-col
    });
    h += `</div>`;  // tree-grid
    h += `</div></div>`;  // card + section
  } else {
    // ==================== 旧 schema：纵向 5 段布局（其它 11 条赛道 + AI全产业链 fallback）====================
    h += `<div class="section"><div class="section-title"><span class="num num-chain">${sec2Label}</span> 全产业链树状图</div>`;
    h += `<div class="section-desc">颜色越深=壁垒越高=越可能藏有卡口。🔒=已识别物理卡口。</div>`;
    h += `<div class="card"><div class="tree-wrapper"><div class="tree">`;
    // Downstream
    h += `<div class="tree-level-label">▼ 下游应用（需求端）</div>`;
    h += `<div class="tree-node b-low" style="min-width:600px;">📱 ${d.treeMap.downstream.name}<br><span style="font-size:11px;color:var(--muted);">${d.treeMap.downstream.note}</span></div>`;
    h += `<div class="tree-vline"></div><div class="tree-hline" style="width:500px;"></div>`;
    // Midstream / System Assembly
    if (d.treeMap.systemAssembly) {
      h += `<div class="tree-level-label" style="margin-top:4px;">▼ 系统集成层</div>`;
      h += `<div class="tree-node b-low" style="min-width:500px;">🏭 ${d.treeMap.systemAssembly.name}<br><span style="font-size:11px;color:var(--muted);">${d.treeMap.systemAssembly.note}</span></div>`;
      h += `<div class="tree-vline"></div><div class="tree-hline" style="width:600px;"></div>`;
    } else if (d.treeMap.midstream) {
      h += `<div class="tree-level-label" style="margin-top:4px;">▼ 中游</div>`;
      h += `<div class="tree-node b-low" style="min-width:500px;">🏭 ${d.treeMap.midstream.name}<br><span style="font-size:11px;color:var(--muted);">${d.treeMap.midstream.note}</span></div>`;
      h += `<div class="tree-vline"></div><div class="tree-hline" style="width:500px;"></div>`;
    }
  // AI全产业链专属：物理维度分层
  if (d.treeMap.computeLabel) {
    h += `<div class="tree-level-label" style="margin-top:8px;">${d.treeMap.computeLabel}</div>`;

    h += `<h3>${c.name}</h3>`;
    // ★ 升级一：整体验证状态徽章（可选字段，没填 verification 就不渲染）
    if (c.verification && c.verification.items && c.verification.items.length) {
      const all = collectVerifyStatuses(chainId, c.code, c.verification.items);
      const ov = computeOverallStatus(all);
      const ocls = ov==='verified'?'tg-green':ov==='falsified'?'tg-extreme':'tg-gray';
      const otxt = ov==='verified'?'✅ 已验证':ov==='falsified'?'❌ 已证伪':'⏳ 待验证';
      h += `<span class="tag verify-overall ${ocls}" style="font-size:10px;margin-left:6px;vertical-align:middle;">${otxt}</span>`;
    }
    h += `<div class="code">${c.code}</div>`;
    h += `<div class="seg">🔒 ${c.segment}</div>`;
    h += `<div class="logic">${c.logic}</div>`;
    // ★ 升级二：估值/择时状态条（可选字段，没填 valuation 就不渲染）
    if (c.valuation && typeof c.valuation.pePercentile === 'number') {
      const p = c.valuation.pePercentile;
      const cls = p >= 80 ? 'tg-extreme' : p >= 30 ? 'tg-high' : 'tg-green';
      const band = p >= 80 ? '估值高位' : p >= 30 ? '估值合理' : '估值低位';
      const parts = [];
      if (c.valuation.pe)          parts.push(`PE ${c.valuation.pe}`);
      parts.push(`分位 ${p}%`);
      if (c.valuation.grossMargin) parts.push(`毛利率 ${c.valuation.grossMargin}`);
      if (c.valuation.fromHigh)    parts.push(c.valuation.fromHigh);
      h += `<div class="valuation" style="font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">`;
      h += `<span>${parts.join(' · ')}</span>`;
      h += `<span class="tag ${cls}" style="font-size:10px;">${band} ${p}%分位</span>`;
      h += `</div>`;
      if (c.valuation.note) {
        h += `<div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:14px;padding-left:10px;border-left:2px solid var(--card2);">📝 ${c.valuation.note}</div>`;
      }
    }
    h += `<div class="tags">`;
    c.tags.forEach(t => {
      h += `<span class="tag ${t.includes('缺口')||t.includes('垄断')||t.includes('替代')||t.includes('寡头')||t.includes('唯一')||t.includes('70%')||t.includes('81%')?'tg-extreme':t.includes('刚通过')||t.includes('认证')||t.includes('替换')?'tg-blue':'tg-green'}">${t}</span>`;
    });
    h += `</div>`;
    // ★ 升级四：从卡口结论一键建卡
    h += `<div style="margin-top:14px;">`;
    h += `<button onclick="addToDecisionCard('${chainId}','${c.code}')" style="padding:6px 14px;background:var(--card2);border:1px solid var(--accent);border-radius:6px;color:var(--accent);font-size:12px;font-weight:600;cursor:pointer;">📌 加入决策卡片</button>`;
    h += `</div>`;
    // ★ 升级一：底部可折叠验证清单（可选字段，没填 verification 就不渲染）
    // 改成纵向卡片式：每个验证项一个小块，维度/论断/怎么查/证伪信号/状态上下排列 —— 适配 3 栏窄列
    if (c.verification && c.verification.items && c.verification.items.length) {
      h += `<details style="margin-top:14px;"><summary style="cursor:pointer;font-size:12px;color:var(--muted);font-weight:600;padding:6px 0;">🔍 卡口验证 (${c.verification.items.length} 项 — 点击展开)</summary>`;
      h += `<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">`;
      c.verification.items.forEach(it => {
        const cur = loadVerifyStatus(chainId, c.code, it.type) || it.status || 'pending';
        const cls = cur==='confirmed'?'tg-green':cur==='broken'?'tg-extreme':'tg-gray';
        const txt = cur==='confirmed'?'✅ 已通过':cur==='broken'?'❌ 已证伪':'⏳ 待验证';
        const accentColor = cur==='confirmed'?'var(--green)':cur==='broken'?'var(--red)':'var(--border)';
        h += `<div style="padding:10px 12px;background:var(--card2);border-radius:6px;border-left:3px solid ${accentColor};">`;
        // 标题行：维度名 + 状态徽章
        h += `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px;">`;
        h += `<div style="font-size:12px;font-weight:700;color:var(--text);">📌 ${it.type}</div>`;
        h += `<span class="tag ${cls}" style="cursor:pointer;font-size:10px;flex-shrink:0;" onclick="cycleVerifyStatus('${chainId}','${c.code}','${it.type}',this)">${txt}</span>`;
        h += `</div>`;
        // 纵向字段：论断 / 怎么查 / 证伪信号
        h += `<div style="font-size:11px;line-height:1.6;margin-bottom:4px;"><span style="color:var(--muted);font-weight:600;">论断：</span>${it.claim}</div>`;
        h += `<div style="font-size:11px;line-height:1.6;margin-bottom:4px;"><span style="color:var(--muted);font-weight:600;">怎么查：</span>${it.howToCheck}</div>`;
        h += `<div style="font-size:11px;line-height:1.6;"><span style="color:var(--muted);font-weight:600;">证伪信号：</span>${it.falsifySignal}</div>`;
        h += `</div>`;
      });
      h += `</div>`;
      if (c.verification.note) {
        h += `<div style="margin-top:8px;padding:8px 12px;background:var(--card2);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;font-size:11px;color:var(--muted);">📝 ${c.verification.note}</div>`;
      }
      h += `</details>`;
    }
    h += `</div>`;
  });
  h += `</div>`;

  // Supply/Demand Gap
  if (d.supplyGap && d.supplyGap.length > 0) {
    h += `<div class="card"><h4 style="margin-bottom:16px;font-size:15px;">📊 供需缺口量化（2026E）</h4>`;
    h += `<table class="stock-tbl"><thead><tr><th>卡口环节</th><th>2026E全球需求</th><th>2026E有效产能</th><th>缺口</th><th>缺口率</th><th>核心瓶颈</th></tr></thead><tbody>`;
    d.supplyGap.forEach(g => {
      h += `<tr><td style="font-weight:600;">${g.segment}</td><td>${g.demand}</td><td>${g.capacity}</td><td><span class="tag tg-extreme" style="font-size:13px;">${g.gap}</span></td><td style="color:var(--red);font-weight:700;">${g.rate}</td><td style="font-size:12px;">${g.bottleneck}</td></tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // Methodology notes
  h += `<div class="card" style="margin-top:18px;border-left:3px solid var(--accent);">`;
  h += `<h4 style="margin-bottom:12px;font-size:14px;color:var(--accent);">⚠️ 方法论失效边界（物理卡口三大局限性）</h4>`;
  h += `<ol style="font-size:13px;color:var(--muted);padding-left:20px;line-height:2.2;">`;
  h += `<li><strong>物理瓶颈长期束缚成长性</strong>：卡口环节受制于物理天花板，长期成长空间有限。一旦供给追上需求，卡口红利消失。</li>`;
  h += `<li><strong>顺风期红利加持</strong>：当前AI算力处于超级上行周期，方法论命中率被放大。若行业下行，卡口逻辑有效性大幅下降。</li>`;
  h += `<li><strong>并非所有产业链环节都存在物理卡口</strong>：${d.methodologyNotes||'多数环节供给充足、替代丰富，找不到符合四大条件的卡口——这是方法论的正常结果。'}</li>`;
  h += `</ol></div>`;
  h += `</div>`;

  container.innerHTML = h;
}

function toggleChangelog() {
  const panel = document.getElementById('changelog-panel');
  const toggle = document.getElementById('cl-toggle');
  panel.classList.toggle('collapsed');
  toggle.classList.toggle('hidden');
}

function renderChangelog() {
  const now = new Date();
  const recentChanges = CHANGELOG.filter(c => {
    const d = new Date(c.date);
    return (now - d) / (1000 * 60 * 60 * 24) <= 7;
  });

  const list = document.getElementById('changelog-list');
  const count = document.getElementById('cl-count');
  const badge = document.getElementById('cl-badge');
  const toggle = document.getElementById('cl-toggle');

  count.textContent = recentChanges.length;
  badge.textContent = recentChanges.length;

  if (recentChanges.length === 0) {
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:12px;text-align:center;">近7天无变更</div>';
    toggle.classList.add('hidden');
    document.getElementById('changelog-panel').classList.add('collapsed');
    return;
  }

  toggle.classList.remove('hidden');
  document.getElementById('changelog-panel').classList.remove('collapsed');

  list.innerHTML = recentChanges.map(c => {
    const dir = c.pct.startsWith('+') ? 'up' : 'down';
    const sectorName = c.sector === 'pcb' ? 'PCB' : c.sector === 'semi' ? '半导体' : c.sector === 'ai-server' ? 'AI服务器' : c.sector === 'hbm' ? 'HBM/存储' : c.sector === 'robotics' ? '人形机器人' : c.sector === 'autonomous-driving' ? '智能驾驶' : c.sector === 'power-semi' ? '功率半导/SiC' : c.sector === 'ai-apps' ? 'AI应用' : c.sector === 'cpo' ? 'CPO光通信' : c.sector === 'solid-battery' ? '固态电池' : c.sector === 'low-altitude' ? '低空经济' : c.sector === 'commercial-aero' ? '商业航天' : c.sector === 'ai-full-chain' ? 'AI全产业链' : c.sector === 'system' ? '系统升级' : c.sector;
    const sectorColor = c.sector === 'pcb' ? 'var(--blue)' : c.sector === 'semi' ? 'var(--purple)' : c.sector === 'ai-server' ? '#3b82f6' : c.sector === 'hbm' ? '#a855f7' : c.sector === 'robotics' ? '#f97316' : c.sector === 'autonomous-driving' ? '#eab308' : c.sector === 'power-semi' ? '#f6465d' : c.sector === 'ai-apps' ? '#0ecb81' : c.sector === 'cpo' ? '#3b82f6' : c.sector === 'solid-battery' ? '#eab308' : c.sector === 'low-altitude' ? '#0ecb81' : c.sector === 'commercial-aero' ? '#f97316' : c.sector === 'ai-full-chain' ? 'var(--accent)' : c.sector === 'system' ? '#3b82f6' : 'var(--muted)';
    return `<div class="changelog-item" onclick="switchChain('${c.sector}')">
      <div class="cl-date">${c.date}</div>
      <div class="cl-sector" style="color:${sectorColor};">${sectorName}</div>
      <div class="cl-desc">${c.desc}</div>
      <div class="cl-change">${c.old} → <strong>${c.new}</strong> <span class="change-badge ${dir}">${c.pct}</span></div>
    </div>`;
  }).join('');
}

// ==================== 决策卡片库渲染（升级四） ====================
function renderCards() {
  currentChain = 'cards';
  document.querySelectorAll('#nav-list .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.chain === 'cards');
  });
  const cards = loadCards();
  let h = '';
  h += `<div class="section"><div class="section-title"><span class="num num-result">📋</span> 我的决策卡片库</div>`;
  h += `<div class="section-desc">把研究结论接上你的决策记录。所有数据存 localStorage（key: myCards），刷新不丢。</div>`;
  // 行内展开表单
  h += `<div class="card" style="padding:20px;margin-bottom:18px;">`;
  h += `<div class="card-header" style="font-size:15px;"><button onclick="toggleNewCardForm()" style="padding:6px 14px;background:var(--accent);color:#0f1117;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">+ 新建决策卡片</button>`;
  h += `<span style="font-size:12px;color:var(--muted);font-weight:500;margin-left:12px;">或从卡口结论的 choke-card 直接点「📌 加入决策卡片」</span></div>`;
  h += `<div id="new-card-form" style="display:none;margin-top:14px;padding:14px;background:var(--card2);border-radius:6px;">`;
  h += formField('whyWatch', '为什么关注它（一句话）', '');
  h += formField('grade', '卡口强度', '★★★ / ★★☆ / 不通过');
  h += formField('pePercentile', 'PE 历史分位（0-100）', '数字');
  h += formField('grossMargin', '毛利率', '如 50%+');
  h += formField('valuationNote', '估值一句话判断', '');
  h += formField('buyLogic', '买入逻辑（什么情况下我错了）', '');
  h += `<div style="margin-bottom:10px;padding:8px 12px;background:rgba(249,115,22,0.15);border-left:3px solid var(--barrier-high);border-radius:0 4px 4px 0;font-size:11px;color:var(--barrier-high);font-weight:600;">⚠️ 买入即写死，盘中不许改</div>`;
  h += formField('sellConditions', '卖出条件', '触发什么信号就撤');
  h += formField('chokeBreakSignal', '卡口什么情况下松动→我就撤', '');
  h += formField('trackSignals', '要跟踪的信号（逗号分隔）', '信号1, 信号2, 信号3');
  h += `<button onclick="saveNewCard()" style="padding:8px 20px;background:var(--green);color:#0f1117;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">💾 保存卡片</button>`;
  h += `<button onclick="toggleNewCardForm()" style="padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;margin-left:8px;">取消</button>`;
  h += `</div></div>`;
  // 卡片网格
  if (!cards.length) {
    h += `<div class="card" style="padding:40px;text-align:center;color:var(--muted);">`;
    h += `📭 还没有决策卡片。在「pcb / semi」等赛道的卡口结论 section 任意一张 choke-card 上点 <strong>「📌 加入决策卡片」</strong>，或上方「+ 新建」手填一张。</div>`;
  } else {
    h += `<div class="decision-grid">`;
    cards.forEach(card => { h += renderCardItem(card); });
    h += `</div>`;
  }
  h += `</div>`;
  document.getElementById('chain-content').innerHTML = h;

function formField(name, label, placeholder) {
  return `<div style="margin-bottom:10px;"><label style="display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;">${label}</label>`
       + `<input name="${name}" placeholder="${placeholder || ''}" style="width:100%;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px;font-family:inherit;" />`
       + `</div>`;
}

function toggleNewCardForm() {
  const el = document.getElementById('new-card-form');
  if (el) el.style.display = (el.style.display === 'none' ? 'block' : 'none');
}

function saveNewCard() {
  const form = document.getElementById('new-card-form');
  if (!form) return;
  const get = n => (form.querySelector(`[name="${n}"]`) || {}).value || '';
  const id = `manual_${Date.now()}`;
  const now = new Date().toISOString().slice(0, 10);
  const card = {
    id, code: '—', name: '手填卡片', chain: 'manual', chainName: '手填',
    segment: '', strength: null, logic: '', tags: [],
    valuation: null, verification: null,
    whyWatch: get('whyWatch'),
    grade: get('grade'),
    pePercentile: parseFloat(get('pePercentile')) || null,
    grossMargin: get('grossMargin'),
    valuationNote: get('valuationNote'),
    buyLogic: get('buyLogic'),
    sellConditions: get('sellConditions'),
    trackSignals: get('trackSignals').split(',').map(s => s.trim()).filter(Boolean),
    chokeBreakSignal: get('chokeBreakSignal'),
    reviews: [], status: 'watching',
    createdAt: now, updatedAt: now
  };
  const all = loadCards();
  all.push(card);
  saveCards(all);
  renderCards();
}

function renderCardItem(card) {
  const stages = [
    !!card.whyWatch,
    !!card.grade,
    card.pePercentile != null || !!card.valuationNote,
    !!card.buyLogic && !!card.sellConditions
  ];
  const done = stages.filter(Boolean).length;
  const statusCls = card.status === 'holding' ? 'tg-blue' : card.status === 'closed' ? 'tg-gray' : 'tg-high';
  const statusTxt = card.status === 'holding' ? '🟢 持仓中' : card.status === 'closed' ? '⚫ 已结案' : '🟡 观察中';
  let h = `<div class="choke-card" style="border-color:var(--border);">`;
  h += `<div class="rank" style="background:var(--card2);color:var(--muted);">${done}/4</div>`;
  h += `<h3 style="font-size:18px;">${card.name} <span style="font-size:12px;color:var(--muted);font-weight:400;">${card.code}</span></h3>`;
  h += `<div class="code">${card.chainName || card.chain} · ${card.segment || '—'}</div>`;
  h += `<div class="seg" style="color:var(--muted);">阶段完成度: ${done}/4</div>`;
  h += `<div style="margin-top:8px;"><span class="tag ${statusCls}" style="font-size:10px;">${statusTxt}</span>`;
  if (card.strength) h += `<span class="tag tg-extreme" style="font-size:10px;margin-left:4px;">卡口 ${card.strength}</span>`;
  h += `</div>`;
  if (card.whyWatch) h += `<div class="logic" style="margin-top:10px;font-size:12px;"><strong>关注理由：</strong>${card.whyWatch}</div>`;
  if (card.buyLogic) h += `<div class="logic" style="font-size:12px;"><strong>买入逻辑：</strong>${card.buyLogic}</div>`;
  if (card.sellConditions) h += `<div class="logic" style="font-size:12px;color:var(--barrier-high);"><strong>卖出条件：</strong>${card.sellConditions}</div>`;
  if (card.trackSignals && card.trackSignals.length) {
    h += `<div style="font-size:11px;color:var(--muted);margin-top:6px;">🔍 跟踪：${card.trackSignals.join(' / ')}</div>`;
  }
  h += `<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">`;
  h += `<button onclick="removeCard('${card.id}')" style="padding:4px 10px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:4px;font-size:11px;cursor:pointer;">🗑️ 删除</button>`;
  h += `<button onclick="toggleCardStatus('${card.id}')" style="padding:4px 10px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;">🔄 切换状态</button>`;
  h += `</div>`;
  h += `</div>`;
  return h;
}

function toggleCardStatus(id) {
  const all = loadCards();
  const idx = all.findIndex(c => c.id === id);
  if (idx < 0) return;
  const cycle = { watching: 'holding', holding: 'closed', closed: 'watching' };
  all[idx].status = cycle[all[idx].status] || 'watching';
  all[idx].updatedAt = new Date().toISOString().slice(0, 10);
  saveCards(all);
  renderCards();
}

// ==================== 交易日志业务函数（升级五） ====================
function loadTrades() { return LS.get(LS_KEYS.trades, []); }
function saveTrades(arr) { LS.set(LS_KEYS.trades, arr); }

function addTrade(trade) {
  const all = loadTrades();
  trade.id = `trade_${Date.now()}`;
  trade.createdAt = new Date().toISOString();
  if (!trade.breakReason) trade.breakReason = '';
  if (!trade.note) trade.note = '';
  all.unshift(trade);
  saveTrades(all);
}

function removeTrade(id) {
  if (!confirm('确定要删除这笔交易记录吗？此操作不可恢复。')) return;
  saveTrades(loadTrades().filter(t => t.id !== id));
  renderTrades();
}

function lookupCardName(cardId) {
  if (!cardId) return '';
  const c = loadCards().find(x => x.id === cardId);
  return c ? c.name : '';
}

// ==================== 交易日志渲染（升级五） ====================
let _tradesFilter = 'all';

function renderTrades() {
  currentChain = 'trades';
  document.querySelectorAll('#nav-list .nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.chain === 'trades');
  });
  const trades = loadTrades();
  let h = '';
  h += `<div class="section"><div class="section-title"><span class="num num-result">📒</span> 交易日志</div>`;
  h += `<div class="section-desc">每笔实盘交易都记录一下，月底看自己冲动了多少次。所有数据存 localStorage（key: myTrades），刷新不丢。</div>`;

  // 顶部统计栏
  const total = trades.length;
  const disciplined = trades.filter(t => t.followedPlan === true).length;

  h += `<div style="flex:1;min-width:120px;"><div style="font-size:11px;color:var(--muted);font-weight:600;">✅ 守纪律</div><div style="font-size:24px;font-weight:700;color:var(--green);">${disciplined} 笔 (${discRate}%)</div></div>`;
  h += `<div style="flex:1;min-width:120px;"><div style="font-size:11px;color:var(--muted);font-weight:600;">❌ 冲动</div><div style="font-size:24px;font-weight:700;color:var(--red);">${impulse} 笔 (${impRate}%)</div></div>`;
  h += `</div>`;

  // 行内展开表单
  h += `<div class="card" style="padding:20px;margin-bottom:18px;">`;
  h += `<div class="card-header" style="font-size:15px;"><button onclick="toggleNewTradeForm()" style="padding:6px 14px;background:var(--accent);color:#0f1117;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;">+ 新建交易记录</button></div>`;
  h += `<div id="new-trade-form" style="display:none;margin-top:14px;padding:14px;background:var(--card2);border-radius:6px;">`;
  h += formField('t_date', '交易日期', 'YYYY-MM-DD');
  h += formField('t_cardId', '关联决策卡片 ID（可选）', '如 pcb_601208_xxx');
  h += `<div style="margin-bottom:10px;"><label style="display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px;">方向</label>`;
  h += `<label style="margin-right:14px;cursor:pointer;font-size:13px;"><input type="radio" name="t_side" value="buy" checked /> 🟢 买入</label>`;
  h += `<label style="cursor:pointer;font-size:13px;"><input type="radio" name="t_side" value="sell" /> 🔴 卖出</label></div>`;
  h += formField('t_price', '价格（元/股）', '如 50.5');
  h += formField('t_qty', '数量（股）', '如 100');
  h += formField('t_note', '一句话想法', '');

  // 两个大按钮：守纪律 / 冲动
  h += `<div style="margin-bottom:10px;"><label style="display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px;">是否守纪律？</label>`;
  h += `<div style="display:flex;gap:10px;">`;
  h += `<button type="button" id="t-btn-disc" onclick="setDiscipline(true)" style="flex:1;padding:12px;background:var(--green);color:#0f1117;border:2px solid var(--green);border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;">✅ 守纪律</button>`;
  h += `<button type="button" id="t-btn-imp" onclick="setDiscipline(false)" style="flex:1;padding:12px;background:var(--card);color:var(--muted);border:2px solid var(--border);border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;">❌ 冲动</button>`;
  h += `</div></div>`;
  h += `<div id="t-break-reason-box" style="display:none;margin-bottom:10px;padding:8px 12px;background:rgba(246,70,93,0.1);border-left:3px solid var(--red);border-radius:0 4px 4px 0;">`;
  h += `<div style="font-size:11px;color:var(--red);font-weight:600;margin-bottom:4px;">⚠️ 选"冲动"时必填：为什么没按计划？</div>`;
  h += formField('t_breakReason', '原因', '例：FOMO 追高 / 跌了扛不住割肉 / 看到别人买就跟');
  h += `</div>`;
  h += `<input type="hidden" id="t_followedPlan" value="true" />`;

  h += `<button onclick="saveNewTrade()" style="padding:8px 20px;background:var(--green);color:#0f1117;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">💾 保存交易</button>`;
  h += `<button onclick="toggleNewTradeForm()" style="padding:8px 14px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;margin-left:8px;">取消</button>`;
  h += `</div></div>`;

  // 顶部筛选：3 chip 按钮
  h += `<div style="margin-bottom:14px;display:flex;gap:8px;align-items:center;">`;
  h += `<span style="font-size:12px;color:var(--muted);font-weight:600;margin-right:6px;">筛选：</span>`;
  const chipAll = _tradesFilter === 'all' ? 'background:var(--accent);color:#0f1117;' : 'background:transparent;color:var(--text);border:1px solid var(--border);';
  const chipDisc = _tradesFilter === 'disciplined' ? 'background:var(--green);color:#0f1117;' : 'background:transparent;color:var(--text);border:1px solid var(--border);';

  h += `<button onclick="setTradesFilter('all')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;${chipAll}">全部</button>`;
  h += `<button onclick="setTradesFilter('disciplined')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;${chipDisc}">✅ 守纪律</button>`;
  h += `<button onclick="setTradesFilter('impulse')" style="padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;${chipImp}">❌ 冲动</button>`;
  h += `</div>`;

  // 交易记录表
  let display = trades;
  if (_tradesFilter === 'disciplined') display = trades.filter(t => t.followedPlan === true);
  if (_tradesFilter === 'impulse') display = trades.filter(t => t.followedPlan === false);

  if (!display.length) {
    h += `<div class="card" style="padding:40px;text-align:center;color:var(--muted);">`;
    if (!total) {

    } else {
      h += `🔍 当前筛选下没有交易记录。</div>`;
    }
  } else {
    h += `<div class="tbl-scroll"><table class="stock-tbl trade-table" style="font-size:12px;"><thead><tr>`;
    h += `<th>日期</th><th>标的</th><th>方向</th><th style="text-align:right;">价格</th><th style="text-align:right;">数量</th><th style="text-align:right;">金额</th><th>守纪律</th><th>备注</th><th style="width:60px;">操作</th>`;
    h += `</tr></thead><tbody>`;
    display.forEach(t => {
      const sideCls = t.side === 'buy' ? 'tg-green' : 'tg-extreme';
      const sideTxt = t.side === 'buy' ? '🟢 买' : '🔴 卖';
      const discCls = t.followedPlan ? 'tg-green' : 'tg-extreme';
      const discTxt = t.followedPlan ? '✅ 守纪律' : '❌ 冲动';
      const rowBg = t.followedPlan === false ? 'background:rgba(246,70,93,0.06);' : '';
      h += `<tr style="${rowBg}">`;
      h += `<td>${t.date || '—'}</td>`;
      h += `<td class="s-name">${t.cardName || (t.cardId ? `[${t.cardId}]` : '—')}<div class="s-code">${t.cardId || ''}</div></td>`;
      h += `<td><span class="tag ${sideCls}" style="font-size:10px;">${sideTxt}</span></td>`;
      h += `<td style="text-align:right;font-family:monospace;">${t.price ? t.price.toFixed(2) : '—'}</td>`;

      h += `<td><button onclick="removeTrade('${t.id}')" style="padding:2px 8px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:3px;font-size:10px;cursor:pointer;">🗑️</button></td>`;
      h += `</tr>`;
    });
    h += `</tbody></table></div>`;
  }
  h += `</div>`;
  document.getElementById('chain-content').innerHTML = h;
  window.scrollTo(0, 0);
}

function setTradesFilter(f) {
  _tradesFilter = f;
  renderTrades();
}

function setDiscipline(followedPlan) {
  document.getElementById('t_followedPlan').value = followedPlan ? 'true' : 'false';
  const discBtn = document.getElementById('t-btn-disc');
  const impBtn = document.getElementById('t-btn-imp');
  const reasonBox = document.getElementById('t-break-reason-box');
  if (followedPlan) {
    discBtn.style.background = 'var(--green)'; discBtn.style.color = '#0f1117'; discBtn.style.borderColor = 'var(--green)'; discBtn.style.fontWeight = '700';
    impBtn.style.background = 'var(--card)'; impBtn.style.color = 'var(--muted)'; impBtn.style.borderColor = 'var(--border)'; impBtn.style.fontWeight = '600';
    if (reasonBox) reasonBox.style.display = 'none';
  } else {
    impBtn.style.background = 'var(--red)'; impBtn.style.color = '#fff'; impBtn.style.borderColor = 'var(--red)'; impBtn.style.fontWeight = '700';
    discBtn.style.background = 'var(--card)'; discBtn.style.color = 'var(--muted)'; discBtn.style.borderColor = 'var(--border)'; discBtn.style.fontWeight = '600';
    if (reasonBox) reasonBox.style.display = 'block';
  }
}

function toggleNewTradeForm() {
  const el = document.getElementById('new-trade-form');
  if (el) el.style.display = (el.style.display === 'none' ? 'block' : 'none');
  setDiscipline(true);
}

function saveNewTrade() {
  const form = document.getElementById('new-trade-form');
  if (!form) return;
  const get = n => (form.querySelector(`[name="${n}"]`) || {}).value || '';
  const followedPlan = document.getElementById('t_followedPlan').value === 'true';
  const breakReason = get('t_breakReason');
  if (!followedPlan && !breakReason.trim()) {
    alert('选了"冲动"必须填原因（为什么没按计划）');
    return;
  }
  const price = parseFloat(get('t_price')) || 0;
  const qty = parseFloat(get('t_qty')) || 0;
  const amount = price * qty;
  const cardId = get('t_cardId').trim();
  const trade = {
    cardId: cardId,
    cardName: lookupCardName(cardId),
    date: get('t_date'),
    side: (form.querySelector('[name="t_side"]:checked') || {}).value || 'buy',
    price: price,
    qty: qty,
    amount: amount,
    followedPlan: followedPlan,
    breakReason: followedPlan ? '' : breakReason,
    note: get('t_note')
  };
  addTrade(trade);
  renderTrades();
}

// ==================== 升级六：自定义赛道（侧栏搜索 + "+"占位） ====================
function loadCustomChains() { return LS.get(LS_KEYS.customChains, []); }
function saveCustomChains(arr) { LS.set(LS_KEYS.customChains, arr); }

function getPCBTemplate() {
  return {

    plainIntro: {

function addCustomChain() {
  const input = document.getElementById('chain-search');
  if (!input) return;
  const name = input.value.trim();
  if (!name) { alert('请输入赛道名'); return; }
  // 重名检查：与现有 12 赛道 + 已有 custom 链 比
  const existing = loadCustomChains();
  if (existing.find(c => c.name === name)) { alert('已有同名赛道: ' + name); input.select(); return; }
  if (Object.values(CHAINS).find(c => c.name === name && c.id !== 'cards' && c.id !== 'trades')) { alert('已有同名赛道: ' + name); input.select(); return; }
  // 生成 id（避免 HTML 属性里的特殊字符）
  const id = 'custom_' + (name.replace(/[^\w一-龥]/g, '_') || 'x') + '_' + Date.now().toString(36);
  // 复制 PCB 模板
  const chain = { ...getPCBTemplate(), id, name, icon: '📊', _isCustom: true, _createdAt: new Date().toISOString() };
  // 持久化
  existing.push(chain);
  saveCustomChains(existing);
  // 注入 CHAINS（走普通赛道渲染路径）
  CHAINS[id] = chain;
  // 插入 nav-item（PCB 之后）
  insertCustomNavItem(chain);
  // 清空输入框
  input.value = '';
  filterSidebar('');  // 重置过滤
  // 跳转
  switchChain(id);
}

function insertCustomNavItem(chain) {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  // 防重（已存在就不插）
  if (navList.querySelector(`[data-chain="${chain.id}"]`)) return;
  const pcbItem = navList.querySelector('[data-chain="pcb"]');
  if (!pcbItem) return;
  const item = document.createElement('span');
  item.className = 'nav-item custom-chain';
  item.dataset.chain = chain.id;
  item.dataset.searchKey = (chain.name + ' ' + chain.id).toLowerCase();
  item.setAttribute('onclick', `switchChain('${chain.id}')`);
  item.innerHTML = `<span style="opacity:0.7;">${chain.icon}</span> ${chain.name} <button class="nav-refresh" onclick="event.stopPropagation();copyRefreshPrompt('${chain.id}')" title="全量研究刷新（200+ 研报 + 壁垒重排 + 数据更新）" style="float:right;background:transparent;border:none;color:var(--muted);font-size:10px;cursor:pointer;padding:0 4px;line-height:1;margin-right:2px;">🔄</button><button onclick="event.stopPropagation();removeCustomChain('${chain.id}')" title="删除此自定义赛道" style="float:right;background:transparent;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:0 4px;line-height:1;">×</button>`;
  // ★ 升级八 Step 2：自定义赛道插到折叠容器内（不再硬塞 PCB 之后）
  const chainCollapsed = document.getElementById('chain-collapsed');
  if (chainCollapsed) chainCollapsed.appendChild(item);
  else pcbItem.insertAdjacentElement('afterend', item);
}

function removeCustomChain(id) {
  if (!confirm('确定删除此自定义赛道？\n（CHANGELOG 提示：删了可以再加，localStorage 数据会被清除）')) return;
  let all = loadCustomChains();
  all = all.filter(c => c.id !== id);
  saveCustomChains(all);
  delete CHAINS[id];
  const item = document.querySelector(`.nav-item[data-chain="${id}"]`);
  if (item) item.remove();
  switchChain('pcb');
}

function loadAllCustomChains() {
  const all = loadCustomChains();
  all.forEach(c => {
    CHAINS[c.id] = c;
    insertCustomNavItem(c);
  });
}

// 侧栏搜索过滤：键入即过滤 nav-list；不匹配的隐藏，分隔行（━ xxx）整组不显示
function filterSidebar(query) {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  const q = (query || '').trim().toLowerCase();
  // 给所有 nav-item 标 searchKey（一次性）
  navList.querySelectorAll('.nav-item[data-chain]').forEach(n => {
    if (!n.dataset.searchKey) {
      const chain = CHAINS[n.dataset.chain];
      n.dataset.searchKey = ((chain ? (chain.name + ' ' + n.dataset.chain) : n.textContent) || '').toLowerCase();
    }
  });
  // 过滤
  let lastGroupVisible = false;
  const items = Array.from(navList.children);
  // ★ 升级八 Step 2：搜索时自动展开折叠容器；清空时恢复 LS 状态
  const collapsible = document.getElementById('chain-collapsed');
  if (collapsible) {
    if (q) collapsible.classList.remove('collapsed');
    else if (LS.get(LS_KEYS.sidebarCollapsed, true) !== false) collapsible.classList.add('collapsed');
  }
  items.forEach(n => {
    if (!n.dataset.chain) {
      // 分隔行（━ xxx）：仅当下一项匹配才显示
      n.style.display = q ? 'none' : '';
    } else {
      const match = !q || (n.dataset.searchKey || '').includes(q);
      n.style.display = match ? '' : 'none';
    }
  });
  // 隐藏没有匹配项的"━ xxx"分组标题（实现：清空 q 时恢复显示，q 非空时一律隐藏分隔行）
  navList.querySelectorAll('.nav-item:not([data-chain])').forEach(n => {
    n.style.display = q ? 'none' : '';
  });
}

// ==================== 路由分发（升级四） ====================
function route() {
  const hash = (window.location.hash || '').replace('#', '') || 'pcb';
  if (hash === 'cards') return renderCards();
  if (hash === 'trades') return renderTrades();   // ★ 升级五
  return switchChain(CHAINS[hash] ? hash : 'pcb');
}

// ===== 升级八 Step 2：侧栏菜单折叠 =====
function toggleSidebarChains() {
  const container = document.getElementById('chain-collapsed');
  const toggle = document.getElementById('chain-toggle');
  if (!container || !toggle) return;
  const willCollapse = !container.classList.contains('collapsed');
  container.classList.toggle('collapsed', willCollapse);
  toggle.textContent = willCollapse ? '▶ 更多赛道 (8)' : '▼ 更多赛道 (8)';
  LS.set(LS_KEYS.sidebarCollapsed, !willCollapse);
}

(function initSidebarCollapse() {
  const container = document.getElementById('chain-collapsed');
  const toggle = document.getElementById('chain-toggle');
  if (!container || !toggle) return;
  const collapsed = LS.get(LS_KEYS.sidebarCollapsed, true) !== false;
  container.classList.toggle('collapsed', collapsed);
  toggle.textContent = collapsed ? '▶ 更多赛道 (8)' : '▼ 更多赛道 (8)';
})();

// ===== 升级八 Step 3：刷新按钮 = 一键复制该赛道标准更新指令 =====
function copyRefreshPrompt(chainId) {
  const d = CHAINS[chainId];
  if (!d) return;
  const text = `请按仓库 .claude/skills/serenity/SKILL.md 里的《新赛道 SOP》和「PCB 赛道同款格式」，重新联网研究并全量更新 CHAINS.${chainId}（${d.name}）的全部数据：
1) 广泛多源检索（券商研报观点、公司公告/财报、行业协会、Prismark/TrendForce/Yole/CPCA 等），关键数据 ≥2-3 个独立信源交叉验证；只摘取事实与数据，严禁复制研报/文章原文（版权）；每项关键数据标注来源+时点；AI 主观估算标 🆪。
2) 保持与 PCB 赛道完全一致的结构：overview 8-9 卡 / treeMap 五列且每子卡含占比+来源 / 每个 segment ≥5 股且按壁垒降序 / 个股 position 含市占率 / trend 徽章(up/down/flat) / midstream ≥10 股 / 三大卡口配 valuation(pePercentile)+verification(4项) / supplyGap。
3) 用新数据替换该赛道现有 CHAINS.${chainId} 数据块，不动其它赛道；index.html 与 产业链全景.html 字节同步；node -e 语法自检；逐条对照 S1-S8+避坑清单；改完报告等我确认，不要自动 commit。`;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => showToast(`已复制《${d.name}》刷新指令，粘贴到 Claude Code 执行`),
      () => fallbackCopy(text, d.name)
    );
  } else {
    fallbackCopy(text, d.name);
  }
}

function fallbackCopy(text, name) {
  window.prompt('请手动复制：', text);
  showToast(`手动复制《${name}》刷新指令`);
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function init() {
  loadAllCustomChains();   // ★ 升级六：复活 localStorage 里的自定义赛道
  route();
  renderChangelog();
}
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('hashchange', () => {
  const hash = (window.location.hash || '').replace('#', '');
  if (hash !== currentChain) route();
});
