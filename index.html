function toggleNewCardForm() {
  const el = document.getElementById('new-card-form');
  if (el) el.style.display = (el.style.display === 'none' ? 'block' : 'none');
}

function saveNewCard() {
  const form = document.getElementById('new-card-form');
  if (!form) return;
  const get = n => (form.querySelector(`[name="${n}"]`) || {}).value || '';
  const id = `manual_${Date.now()}`;
  const now = new Date().toISOString().slice(0, 10);
  const card = {
    id, code: '—', name: '手填卡片', chain: 'manual', chainName: '手填',
    segment: '', strength: null, logic: '', tags: [],
    valuation: null, verification: null,
    whyWatch: get('whyWatch'),
    grade: get('grade'),
    pePercentile: parseFloat(get('pePercentile')) || null,
    grossMargin: get('grossMargin'),
    valuationNote: get('valuationNote'),
    buyLogic: get('buyLogic'),
    sellConditions: get('sellConditions'),
    trackSignals: get('trackSignals').split(',').map(s => s.trim()).filter(Boolean),
    chokeBreakSignal: get('chokeBreakSignal'),
    reviews: [], status: 'watching',
    createdAt: now, updatedAt: now
  };
  const all = loadCards();
  all.push(card);
  saveCards(all);
  renderCards();
}

function renderCardItem(card) {
  const stages = [
    !!card.whyWatch,
    !!card.grade,
    card.pePercentile != null || !!card.valuationNote,
    !!card.buyLogic && !!card.sellConditions
  ];
  const done = stages.filter(Boolean).length;
  const statusCls = card.status === 'holding' ? 'tg-blue' : card.status === 'closed' ? 'tg-gray' : 'tg-high';
  const statusTxt = card.status === 'holding' ? '🟢 持仓中' : card.status === 'closed' ? '⚫ 已结案' : '🟡 观察中';
  let h = `<div class="choke-card" style="border-color:var(--border);">`;
  h += `<div class="rank" style="background:var(--card2);color:var(--muted);">${done}/4</div>`;
  h += `<h3 style="font-size:18px;">${card.name} <span style="font-size:12px;color:var(--muted);font-weight:400;">${card.code}</span></h3>`;
  h += `<div class="code">${card.chainName || card.chain} · ${card.segment || '—'}</div>`;
  h += `<div class="seg" style="color:var(--muted);">阶段完成度: ${done}/4</div>`;
  h += `<div style="margin-top:8px;"><span class="tag ${statusCls}" style="font-size:10px;">${statusTxt}</span>`;
  if (card.strength) h += `<span class="tag tg-extreme" style="font-size:10px;margin-left:4px;">卡口 ${card.strength}</span>`;
  h += `</div>`;
  if (card.whyWatch) h += `<div class="logic" style="margin-top:10px;font-size:12px;"><strong>关注理由：</strong>${card.whyWatch}</div>`;
  if (card.buyLogic) h += `<div class="logic" style="font-size:12px;"><strong>买入逻辑：</strong>${card.buyLogic}</div>`;
  if (card.sellConditions) h += `<div class="logic" style="font-size:12px;color:var(--barrier-high);"><strong>卖出条件：</strong>${card.sellConditions}</div>`;
  if (card.trackSignals && card.trackSignals.length) {
    h += `<div style="font-size:11px;color:var(--muted);margin-top:6px;">🔍 跟踪：${card.trackSignals.join(' / ')}</div>`;
  }
  h += `<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;">`;
  h += `<button onclick="removeCard('${card.id}')" style="padding:4px 10px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:4px;font-size:11px;cursor:pointer;">🗑️ 删除</button>`;
  h += `<button onclick="toggleCardStatus('${card.id}')" style="padding:4px 10px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;cursor:pointer;">🔄 切换状态</button>`;
  h += `</div>`;
  h += `</div>`;
  return h;
}

function toggleCardStatus(id) {
  const all = loadCards();
  const idx = all.findIndex(c => c.id === id);
  if (idx < 0) return;
  const cycle = { watching: 'holding', holding: 'closed', closed: 'watching' };
  all[idx].status = cycle[all[idx].status] || 'watching';
  all[idx].updatedAt = new Date().toISOString().slice(0, 10);
  saveCards(all);
  renderCards();
}

// ==================== 交易日志业务函数（升级五） ====================
function loadTrades() { return LS.get(LS_KEYS.trades, []); }
function saveTrades(arr) { LS.set(LS_KEYS.trades, arr); }

function addTrade(trade) {
  const all = loadTrades();
  trade.id = `trade_${Date.now()}`;
  trade.createdAt = new Date().toISOString();
  if (!trade.breakReason) trade.breakReason = '';
  if (!trade.note) trade.note = '';
  all.unshift(trade);
  saveTrades(all);
}

function removeTrade(id) {
  if (!confirm('确定要删除这笔交易记录吗？此操作不可恢复。')) return;
  saveTrades(loadTrades().filter(t => t.id !== id));
  renderTrades();
}

function lookupCardName(cardId) {
  if (!cardId) return '';
  const c = loadCards().find(x => x.id === cardId);
  return c ? c.name : '';
}

      h += `<tr style="${rowBg}">`;

      h += `<td class="s-name">${t.cardName || (t.cardId ? `[${t.cardId}]` : '—')}<div class="s-code">${t.cardId || ''}</div></td>`;

      h += `<td style="text-align:right;font-family:monospace;font-weight:600;">${t.amount ? t.amount.toFixed(0) : '—'}</td>`;
      h += `<td><span class="tag ${discCls}" style="font-size:10px;cursor:help;" title="${t.breakReason || ''}">${discTxt}</span></td>`;
      h += `<td style="font-size:11px;max-width:200px;">${t.note || ''}${t.breakReason ? `<div style="color:var(--red);font-size:10px;margin-top:2px;">原因：${t.breakReason}</div>` : ''}</td>`;

      h += `</tr>`;
    });
    h += `</tbody></table></div>`;
  }
  h += `</div>`;
  document.getElementById('chain-content').innerHTML = h;
  window.scrollTo(0, 0);
}

function saveNewTrade() {
  const form = document.getElementById('new-trade-form');
  if (!form) return;
  const get = n => (form.querySelector(`[name="${n}"]`) || {}).value || '';
  const followedPlan = document.getElementById('t_followedPlan').value === 'true';
  const breakReason = get('t_breakReason');
  if (!followedPlan && !breakReason.trim()) {
    alert('选了"冲动"必须填原因（为什么没按计划）');
    return;
  }
  const price = parseFloat(get('t_price')) || 0;
  const qty = parseFloat(get('t_qty')) || 0;
  const amount = price * qty;
  const cardId = get('t_cardId').trim();
  const trade = {
    cardId: cardId,
    cardName: lookupCardName(cardId),
    date: get('t_date'),
    side: (form.querySelector('[name="t_side"]:checked') || {}).value || 'buy',
    price: price,
    qty: qty,
    amount: amount,
    followedPlan: followedPlan,
    breakReason: followedPlan ? '' : breakReason,
    note: get('t_note')
  };
  addTrade(trade);
  renderTrades();
}

function addCustomChain() {
  const input = document.getElementById('chain-search');
  if (!input) return;
  const name = input.value.trim();
  if (!name) { alert('请输入赛道名'); return; }
  // 重名检查：与现有 12 赛道 + 已有 custom 链 比
  const existing = loadCustomChains();
  if (existing.find(c => c.name === name)) { alert('已有同名赛道: ' + name); input.select(); return; }
  if (Object.values(CHAINS).find(c => c.name === name && c.id !== 'cards' && c.id !== 'trades')) { alert('已有同名赛道: ' + name); input.select(); return; }
  // 生成 id（避免 HTML 属性里的特殊字符）
  const id = 'custom_' + (name.replace(/[^\w一-龥]/g, '_') || 'x') + '_' + Date.now().toString(36);
  // 复制 PCB 模板
  const chain = { ...getPCBTemplate(), id, name, icon: '📊', _isCustom: true, _createdAt: new Date().toISOString() };
  // 持久化
  existing.push(chain);
  saveCustomChains(existing);
  // 注入 CHAINS（走普通赛道渲染路径）
  CHAINS[id] = chain;
  // 插入 nav-item（PCB 之后）
  insertCustomNavItem(chain);
  // 清空输入框
  input.value = '';
  filterSidebar('');  // 重置过滤
  // 跳转
  switchChain(id);
}

function insertCustomNavItem(chain) {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  // 防重（已存在就不插）
  if (navList.querySelector(`[data-chain="${chain.id}"]`)) return;
  const pcbItem = navList.querySelector('[data-chain="pcb"]');
  if (!pcbItem) return;
  const item = document.createElement('span');
  item.className = 'nav-item custom-chain';
  item.dataset.chain = chain.id;
  item.dataset.searchKey = (chain.name + ' ' + chain.id).toLowerCase();
  item.setAttribute('onclick', `switchChain('${chain.id}')`);
  item.innerHTML = `<span style="opacity:0.7;">${chain.icon}</span> ${chain.name} <button class="nav-refresh" onclick="event.stopPropagation();copyRefreshPrompt('${chain.id}')" title="全量研究刷新（200+ 研报 + 壁垒重排 + 数据更新）" style="float:right;background:transparent;border:none;color:var(--muted);font-size:10px;cursor:pointer;padding:0 4px;line-height:1;margin-right:2px;">🔄</button><button onclick="event.stopPropagation();removeCustomChain('${chain.id}')" title="删除此自定义赛道" style="float:right;background:transparent;border:none;color:var(--red);font-size:12px;cursor:pointer;padding:0 4px;line-height:1;">×</button>`;

function removeCustomChain(id) {
  if (!confirm('确定删除此自定义赛道？\n（CHANGELOG 提示：删了可以再加，localStorage 数据会被清除）')) return;
  let all = loadCustomChains();
  all = all.filter(c => c.id !== id);
  saveCustomChains(all);
  delete CHAINS[id];
  const item = document.querySelector(`.nav-item[data-chain="${id}"]`);
  if (item) item.remove();
  switchChain('pcb');
}

function loadAllCustomChains() {
  const all = loadCustomChains();
  all.forEach(c => {
    CHAINS[c.id] = c;
    insertCustomNavItem(c);
  });
}

// 侧栏搜索过滤：键入即过滤 nav-list；不匹配的隐藏，分隔行（━ xxx）整组不显示
function filterSidebar(query) {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  const q = (query || '').trim().toLowerCase();
  // 给所有 nav-item 标 searchKey（一次性）
  navList.querySelectorAll('.nav-item[data-chain]').forEach(n => {
    if (!n.dataset.searchKey) {
      const chain = CHAINS[n.dataset.chain];
      n.dataset.searchKey = ((chain ? (chain.name + ' ' + n.dataset.chain) : n.textContent) || '').toLowerCase();
    }
  });
  // 过滤
  let lastGroupVisible = false;
  const items = Array.from(navList.children);
  // ★ 升级八 Step 2：搜索时自动展开折叠容器；清空时恢复 LS 状态
  const collapsible = document.getElementById('chain-collapsed');
  if (collapsible) {
    if (q) collapsible.classList.remove('collapsed');
    else if (LS.get(LS_KEYS.sidebarCollapsed, true) !== false) collapsible.classList.add('collapsed');
  }
  items.forEach(n => {
    if (!n.dataset.chain) {
      // 分隔行（━ xxx）：仅当下一项匹配才显示
      n.style.display = q ? 'none' : '';
    } else {
      const match = !q || (n.dataset.searchKey || '').includes(q);
      n.style.display = match ? '' : 'none';
    }
  });
  // 隐藏没有匹配项的"━ xxx"分组标题（实现：清空 q 时恢复显示，q 非空时一律隐藏分隔行）
  navList.querySelectorAll('.nav-item:not([data-chain])').forEach(n => {
    n.style.display = q ? 'none' : '';
  });
}

// ==================== 升级九 STEP 3：赛道擂台 #arena（横向比 12+ 条赛道） ====================
// 依据：景气六维样板 §8.4。当前只有 PCB 有 prosperity，其余赛道行显示"六维待回填"。
// 0 CSS 增量：复用 .stock-tbl / .card / .highlight-box / var(--*) 调色板
let _arenaState = { tab:'sector', sortKey: 'ltFit', sortDir: 'desc', filterSector: '', filterTier: '',
  stockSortKey:'fit', stockSortDir:'desc', stockFilterChain:'', stockFilterBarrier:'', stockFilterTier:'', stockFilterStockTier:'' };

function switchArenaTab(tab){
  if (_arenaState.tab === tab) return;
  _arenaState.tab = tab;
  renderArena();
}

function sortArena(key) {
  if (_arenaState.sortKey === key) {
    _arenaState.sortDir = _arenaState.sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    _arenaState.sortKey = key;
    // name/sector/tier 字符串字段默认升序，其它分数字段默认降序
    _arenaState.sortDir = (key === 'name' || key === 'sector' || key === 'tier') ? 'asc' : 'desc';
  }
  renderArena();
}

function filterArena(type, val) {
  if (type === 'sector') _arenaState.filterSector = val;
  if (type === 'tier')   _arenaState.filterTier = val;
  renderArena();
}

// ★ 升级 F1：个股榜专用 sort/filter
function sortStockArena(key){
  if (_arenaState.stockSortKey === key){
    _arenaState.stockSortDir = _arenaState.stockSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    _arenaState.stockSortKey = key;
    _arenaState.stockSortDir = (key === 'name' || key === 'code' || key === 'chains' || key === 'segments' || key === 'barrier' || key === 'tier') ? 'asc' : 'desc';
  }
  renderArena();
}
function filterStockArena(type, val){
  if (type === 'chain')   _arenaState.stockFilterChain = val;
  if (type === 'barrier') _arenaState.stockFilterBarrier = val;
  if (type === 'tier')    _arenaState.stockFilterTier = val;        // 分档：core/watch/avoid
  if (type === 'stier')   _arenaState.stockFilterStockTier = val;  // 信源tier：primary/broker/media/estimate
  renderArena();
}

function renderArena() {
  const container = document.getElementById('chain-content');
  if (!container) return;
  // ★ 升级 F1：tab 切换 dispatch（默认 sector）
  if (_arenaState.tab === 'stock') return renderStockArena();

  // 收集所有 CHAINS 行
  const rows = [];
  Object.keys(CHAINS).forEach(id => {
    const c = CHAINS[id];
    if (!c) return;
    const hasP = !!(c.prosperity && c.prosperity.dims && c.prosperity.dims.length === 6);
    const lt = hasP && typeof computeLtFit === 'function' ? computeLtFit(c.prosperity) : null;
    const dimScores = {};
    if (hasP) c.prosperity.dims.forEach(d => { dimScores[d.key] = d.score; });
    const m = c.meta || {};
    rows.push({
      id, name: c.name || id, icon: c.icon || '',
      sector: m.sector || '', tier: m.tier || '', status: m.status || '',
      hasP, d: dimScores,
      ltScore: lt ? lt.score : -1, ltTier: lt ? lt.tier : '', ltRisk: lt ? lt.risk : false
    });
  });

  // 筛选
  const _s = _arenaState;
  let filtered = rows.filter(r => {
    if (_s.filterSector && r.sector !== _s.filterSector) return false;
    if (_s.filterTier   && r.tier   !== _s.filterTier)   return false;
    return true;
  });

  // 排序（未填六维的行无论升降都垫底）
  filtered.sort((a, b) => {
    if (a.hasP !== b.hasP) return a.hasP ? -1 : 1;
    let av, bv;
    if (_s.sortKey === 'name')        { av = a.name;   bv = b.name; }
    else if (_s.sortKey === 'sector') { av = a.sector; bv = b.sector; }
    else if (_s.sortKey === 'tier')   { av = a.tier;   bv = b.tier; }
    else if (_s.sortKey === 'ltFit')  { av = a.ltScore;bv = b.ltScore; }
    else                              { av = a.d[_s.sortKey] ?? -1; bv = b.d[_s.sortKey] ?? -1; }
    if (av < bv) return _s.sortDir === 'desc' ? 1 : -1;
    if (av > bv) return _s.sortDir === 'desc' ? -1 : 1;
    return 0;
  });

  const sectors = [...new Set(rows.map(r => r.sector).filter(Boolean))].sort();
  const tiers   = [...new Set(rows.map(r => r.tier).filter(Boolean))].sort();

  let h = '';
  h += `<div class="section"><div class="section-title"><span class="num num-macro">🏟️</span> 擂台 — 横向比对</div>`;
  // ★ 升级 F1：tab 切换条
  h += `<div style="display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);">`;
  h += `<span onclick="switchArenaTab('sector')" style="cursor:pointer;padding:8px 18px;font-size:13px;border-bottom:2px solid ${_s.tab==='sector'?'var(--accent)':'transparent'};color:${_s.tab==='sector'?'var(--accent)':'var(--muted)'};font-weight:${_s.tab==='sector'?'600':'400'};transition:color .2s;">📊 赛道榜</span>`;
  h += `<span onclick="switchArenaTab('stock')" style="cursor:pointer;padding:8px 18px;font-size:13px;border-bottom:2px solid ${_s.tab==='stock'?'var(--accent)':'transparent'};color:${_s.tab==='stock'?'var(--accent)':'var(--muted)'};font-weight:${_s.tab==='stock'?'600':'400'};transition:color .2s;">📈 个股榜</span>`;
  h += `</div>`;
  h += `<div class="section-desc">所有赛道按景气六维综合分横向排序；点列头切换排序，顶部按板块/层级筛选。综合分 = Σ(score/5 × 权重) × 100（权重：持续 0.25 / 兑现 0.25 / 估值 0.20 / 供需 0.12 / 壁垒 0.10 / 政策 0.08）；估值或壁垒 ≤1 触发安全垫门控（封顶 60 + ⚠风险）。🆪 AI 主观判断，cron 不刷顶部"数据截止"日期。</div>`;

  // 筛选条
  h += `<div class="card" style="padding:14px 18px;margin-bottom:14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px;">`;
  h += `<span style="color:var(--muted);">筛选：</span>`;
  h += `<label>板块 <select onchange="filterArena('sector', this.value)" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;margin-left:4px;">`;
  h += `<option value="">全部 (${rows.length})</option>`;
  sectors.forEach(s => { h += `<option value="${s}"${_s.filterSector===s?' selected':''}>${s}</option>`; });
  h += `</select></label>`;
  h += `<label>层级 <select onchange="filterArena('tier', this.value)" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;margin-left:4px;">`;
  h += `<option value="">全部</option>`;
  tiers.forEach(t => { h += `<option value="${t}"${_s.filterTier===t?' selected':''}>${t}</option>`; });
  h += `</select></label>`;
  h += `<span style="margin-left:auto;color:var(--muted);font-size:12px;">显示 ${filtered.length} / ${rows.length} 条 · 已填六维 <strong style="color:var(--accent);">${rows.filter(r=>r.hasP).length}</strong> 条</span>`;
  h += `</div>`;

  const sortArrow = key => {
    if (_s.sortKey !== key) return '<span style="opacity:0.3;font-size:10px;">⇅</span>';
    return _s.sortDir === 'desc' ? '<span style="color:var(--accent);">▼</span>' : '<span style="color:var(--accent);">▲</span>';
  };
  const colHeaders = [
    { key:'name',       label:'赛道',   w:'150px', align:'left'   },
    { key:'sector',     label:'板块',   w:'70px',  align:'center' },
    { key:'tier',       label:'层级',   w:'70px',  align:'center' },
    { key:'durability', label:'持续',   w:'52px',  align:'center' },
    { key:'visibility', label:'兑现',   w:'52px',  align:'center' },
    { key:'policy',     label:'政策',   w:'52px',  align:'center' },
    { key:'supply',     label:'供需',   w:'52px',  align:'center' },
    { key:'valuation',  label:'估值',   w:'52px',  align:'center' },
    { key:'barrier',    label:'壁垒',   w:'52px',  align:'center' },
    { key:'ltFit',      label:'综合分', w:'110px', align:'left'   }
  ];

  h += `<div class="card" style="padding:0;overflow-x:auto;">`;
  h += `<table class="stock-tbl" style="font-size:13px;margin:0;">`;
  h += `<thead><tr>`;
  colHeaders.forEach(c => {
    h += `<th onclick="sortArena('${c.key}')" style="cursor:pointer;user-select:none;width:${c.w};text-align:${c.align};">${c.label} ${sortArrow(c.key)}</th>`;
  });
  h += `</tr></thead><tbody>`;

  if (!filtered.length) {
    h += `<tr><td colspan="${colHeaders.length}" style="text-align:center;color:var(--muted);padding:24px;">无符合筛选条件的赛道</td></tr>`;
  }

  filtered.forEach(r => {
    h += `<tr${r.hasP ? '' : ' style="opacity:0.55;"'}>`;
    h += `<td style="font-weight:600;cursor:pointer;" onclick="window.location.hash='${r.id}'" title="点击进入 ${r.name} 详细页">${r.icon} ${r.name}</td>`;
    h += `<td style="text-align:center;">${r.sector || '—'}</td>`;
    h += `<td style="text-align:center;">${r.tier   || '—'}</td>`;
    ['durability','visibility','policy','supply','valuation','barrier'].forEach(k => {
      const s = r.d[k];
      if (s === undefined) {
        h += `<td style="text-align:center;color:var(--barrier-low);">—</td>`;
      } else {
        const color = s >= 4 ? 'var(--green)' : s >= 3 ? 'var(--barrier-high)' : s >= 2 ? 'var(--barrier-mid)' : 'var(--red)';
        h += `<td style="text-align:center;color:${color};font-weight:600;font-family:monospace;">${s}</td>`;
      }
    });
    if (r.hasP) {
      h += `<td style="font-family:monospace;font-weight:700;"><span style="color:var(--accent);font-size:16px;">${r.ltScore}</span><span style="color:var(--muted);font-size:11px;">/100</span> ${r.ltTier}${r.ltRisk?' <span style="color:var(--red);font-size:10px;" title="安全垫不足：估值或壁垒≤1，已封顶 60">⚠</span>':''}</td>`;
    } else {
      h += `<td style="color:var(--muted);font-size:11px;">六维待回填</td>`;
    }
    h += `</tr>`;
  });

  h += `</tbody></table></div>`;
  h += `<div class="highlight-box" style="margin-top:14px;font-size:12px;">💡 <strong>怎么读：</strong>点击赛道名进入该条详细页 · 点列头切换升降排序 · tier 阈值：🟢 综合 ≥75 / 🟡 ≥55 / 🔴 <55 · 安全垫不足（估值或壁垒 ≤1）→ ⚠ 自动封顶 60。<br>📌 当前只有 PCB 已填六维（试点），其余赛道将按 STEP 5 节奏逐条回填。</div>`;
  h += `</div>`;

  container.innerHTML = h;
  // 高亮侧栏 arena 入口
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.chain === 'arena'));
}

// ==================== 升级 F1：个股擂台 renderStockArena ====================
// 遍历 13 条赛道，收集有 dims6 的个股，按 code 去重（同一只票只一行，列其出现的多链+多环节）。
// 跨链 dims6 不一致 → 行末 ⚠️"跨链不一致"。
// 列：个股(名+代码,点击跳转定位) | 所属赛道 | 环节 | 综合分(分档色) | 壁垒档 | 信源tier | 迷你六维bar。
// 0 CSS 增量：复用 .stock-tbl / .tag .tg-* / var(--*) 调色板。
function renderStockArena() {
  const container = document.getElementById('chain-content');
  if (!container) return;
  const _s = _arenaState;

  // ── 1. 收集所有有 dims6 的个股，按 code 去重
  const stockMap = new Map(); // code -> entry
  let totalRaw = 0;            // 含 dims6 的总行数（去重前）
  Object.keys(CHAINS).forEach(chainId => {
    const c = CHAINS[chainId];
    if (!c) return;
    const chainName = c.name || chainId;
    const chainTier = (c.meta && c.meta.tier) || '';
    const collect = (stocks, segLabel) => {
      if (!stocks) return;
      stocks.forEach(s => {
        if (!s.dims6 || !s.dims6.length || !s.code) return;
        totalRaw++;
        if (!stockMap.has(s.code)) {
          stockMap.set(s.code, { code:s.code, name:s.name || s.code, barrier:s.barrier || '中', dims6List:[], chains:[], segs:[] });
        }
        const e = stockMap.get(s.code);
        // 同一链同一股只记一次（避免 segments + midstream 重复登记）
        const dupKey = chainId + '|' + (segLabel||'') + '|' + s.code;
        if (e.dims6List.some(x => x.key === dupKey)) return;
        e.dims6List.push({ key:dupKey, dims6:s.dims6 });
        if (e.chains.indexOf(chainName) < 0) e.chains.push(chainName);
        if (segLabel && e.segs.indexOf(segLabel) < 0) e.segs.push(segLabel);
      });
    };
    (c.segments || []).forEach(seg => collect(seg.stocks, seg.name));
    if (c.midstream && c.midstream.stocks) collect(c.midstream.stocks, c.midstream.name || '中游');
  });

  // ── 2. 构造行（用第一只 dims6 算 fit；跨链不一致检测）
  const rows = [];
  stockMap.forEach(e => {
    const primaryDims = e.dims6List[0].dims6;
    const fit = computeStockFit(primaryDims) || { score:0, tier:'🔴回避/等', risk:false };
    const inconsistent = e.dims6List.length > 1 && e.dims6List.some(x => JSON.stringify(x.dims6) !== JSON.stringify(primaryDims));
    const tierKey = fit.tier.indexOf('🟢')===0 ? 'core' : fit.tier.indexOf('🟡')===0 ? 'watch' : 'avoid';
    rows.push({
      code:e.code, name:e.name, barrier:e.barrier,
      chains: e.chains.join(' / '),
      segs: e.segs.join(' / '),
      dims6: primaryDims,
      fit, inconsistent,
      tierKey,
      // 链来源 code（用于筛选 + 跳转）：用第一个出现的链
      primaryChain: (CHAINS[Object.keys(CHAINS).find(id => (CHAINS[id]||{}).name === e.chains[0])] || {}).id || '',
      primaryChainId: (() => {
        for (const id of Object.keys(CHAINS)) {
          const c = CHAINS[id]; if (!c) continue;
          const inThis = (c.segments||[]).some(seg => (seg.stocks||[]).some(s => s.code === e.code && s.dims6)) ||
                         (c.midstream && (c.midstream.stocks||[]).some(s => s.code === e.code && s.dims6));
          if (inThis) return id;
        }
        return '';
      })()
    });
  });

  // ── 3. 筛选
  let filtered = rows.filter(r => {
    if (_s.stockFilterChain   && r.chains.indexOf(_s.stockFilterChain) < 0) return false;
    if (_s.stockFilterBarrier && r.barrier !== _s.stockFilterBarrier) return false;
    if (_s.stockFilterTier    && r.tierKey !== _s.stockFilterTier) return false;
    return true;
  });

  // ── 4. 排序
  const sk = _s.stockSortKey, sd = _s.stockSortDir;
  filtered.sort((a, b) => {
    let av, bv;
    if (sk === 'name')      { av = a.name;  bv = b.name; }
    else if (sk === 'code') { av = a.code;  bv = b.code; }
    else if (sk === 'chains')   { av = a.chains; bv = b.chains; }
    else if (sk === 'segments') { av = a.segs;   bv = b.segs; }
    else if (sk === 'barrier')  { av = a.barrier; bv = b.barrier; }
    else if (sk === 'fit')      { av = a.fit.score; bv = b.fit.score; }
    else if (sk === 'durability'){ av = (a.dims6.find(d=>d.key==='durability')||{score:0}).score; bv = (b.dims6.find(d=>d.key==='durability')||{score:0}).score; }
    else if (sk === 'visibility'){ av = (a.dims6.find(d=>d.key==='visibility')||{score:0}).score; bv = (b.dims6.find(d=>d.key==='visibility')||{score:0}).score; }
    else if (sk === 'valuation') { av = (a.dims6.find(d=>d.key==='valuation')||{score:0}).score;  bv = (b.dims6.find(d=>d.key==='valuation')||{score:0}).score; }
    else if (sk === 'barrier_d') { av = (a.dims6.find(d=>d.key==='barrier')||{score:0}).score;    bv = (b.dims6.find(d=>d.key==='barrier')||{score:0}).score; }
    else { av = a.fit.score; bv = b.fit.score; }
    if (av < bv) return sd === 'desc' ? 1 : -1;
    if (av > bv) return sd === 'desc' ? -1 : 1;
    return 0;
  });

  // ── 5. 筛选选项
  const chainOpts = [...new Set(rows.map(r => r.chains.split(' / ')).flat())].filter(Boolean).sort();
  const barrierOpts = ['极高','高','中','低'].filter(b => rows.some(r => r.barrier === b));
  const tierOpts = [{k:'core',l:'🟢核心'},{k:'watch',l:'🟡观察'},{k:'avoid',l:'🔴回避/等'}];

  // ── 6. 渲染
  const sortArrow = key => _s.stockSortKey !== key ? '<span style="opacity:0.3;font-size:10px;">⇅</span>' : (_s.stockSortDir === 'desc' ? '<span style="color:var(--accent);">▼</span>' : '<span style="color:var(--accent);">▲</span>');

  let h = '';
  h += `<div class="section"><div class="section-title"><span class="num num-macro">🏟️</span> 擂台 — 横向比对</div>`;
  // ★ tab 切换条
  h += `<div style="display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);">`;
  h += `<span onclick="switchArenaTab('sector')" style="cursor:pointer;padding:8px 18px;font-size:13px;border-bottom:2px solid ${_s.tab==='sector'?'var(--accent)':'transparent'};color:${_s.tab==='sector'?'var(--accent)':'var(--muted)'};font-weight:${_s.tab==='sector'?'600':'400'};transition:color .2s;">📊 赛道榜</span>`;
  h += `<span onclick="switchArenaTab('stock')" style="cursor:pointer;padding:8px 18px;font-size:13px;border-bottom:2px solid ${_s.tab==='stock'?'var(--accent)':'transparent'};color:${_s.tab==='stock'?'var(--accent)':'var(--muted)'};font-weight:${_s.tab==='sector'?'400':'600'};transition:color .2s;">📈 个股榜</span>`;
  h += `</div>`;
  h += `<div class="section-desc">所有<strong>已填六维</strong>赛道的有 dims6 个股横向比；按 code 去重，同一票只占一行并列出其出现的赛道与环节。综合分 = 与赛道综合分同口径（权重：持续 0.25/兑现 0.25/估值 0.20/供需 0.12/壁垒 0.10/政策 0.08）。🆪 AI 主观判断。<br><strong style="color:var(--accent);">⚠ 长线适配分=同口径研究排序参考、非买卖信号；仅含已上六维的赛道（当前 PCB/HBM）。</strong></div>`;

  // 筛选条
  h += `<div class="card" style="padding:14px 18px;margin-bottom:14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:13px;">`;
  h += `<span style="color:var(--muted);">筛选：</span>`;
  // 赛道
  h += `<label>赛道 <select onchange="filterStockArena('chain', this.value)" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;margin-left:4px;">`;
  h += `<option value="">全部 (${rows.length})</option>`;
  chainOpts.forEach(s => { h += `<option value="${s}"${_s.stockFilterChain===s?' selected':''}>${s}</option>`; });
  h += `</select></label>`;
  // 壁垒档
  h += `<label>壁垒档 <select onchange="filterStockArena('barrier', this.value)" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;margin-left:4px;">`;
  h += `<option value="">全部</option>`;
  barrierOpts.forEach(b => { h += `<option value="${b}"${_s.stockFilterBarrier===b?' selected':''}>${b}</option>`; });
  h += `</select></label>`;
  // 分档
  h += `<label>分档 <select onchange="filterStockArena('tier', this.value)" style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;margin-left:4px;">`;
  h += `<option value="">全部</option>`;
  tierOpts.forEach(t => { h += `<option value="${t.k}"${_s.stockFilterTier===t.k?' selected':''}>${t.l}</option>`; });
  h += `</select></label>`;
  h += `<span style="margin-left:auto;color:var(--muted);font-size:12px;">显示 ${filtered.length} / ${rows.length} 条（去重前 ${totalRaw} · ${rows.length - filtered.length < 0 ? 0 : 0} 跨链合并）</span>`;
  h += `</div>`;

  // 表
  const colHeaders = [
    { key:'code',     label:'代码',   w:'70px',  align:'left'   },
    { key:'name',     label:'个股',   w:'150px', align:'left'   },
    { key:'chains',   label:'所属赛道', w:'160px', align:'left'   },
    { key:'segments', label:'环节',   w:'150px', align:'left'   },
    { key:'fit',      label:'综合分', w:'120px', align:'left'   },
    { key:'barrier',  label:'壁垒',   w:'60px',  align:'center' },
    { key:'durability', label:'持续', w:'52px',  align:'center' },
    { key:'visibility', label:'兑现', w:'52px',  align:'center' },
    { key:'valuation',  label:'估值', w:'52px',  align:'center' },
    { key:'barrier_d',  label:'壁垒', w:'52px',  align:'center' }
  ];
  h += `<div class="card" style="padding:0;overflow-x:auto;">`;
  h += `<table class="stock-tbl" style="font-size:12px;margin:0;">`;
  h += `<thead><tr>`;
  colHeaders.forEach(c => {
    h += `<th onclick="sortStockArena('${c.key}')" style="cursor:pointer;user-select:none;width:${c.w};text-align:${c.align};">${c.label} ${sortArrow(c.key)}</th>`;
  });
  h += `<th style="text-align:left;width:140px;">迷你六维</th>`;
  h += `</tr></thead><tbody>`;

  if (!filtered.length) {
    h += `<tr><td colspan="${colHeaders.length + 1}" style="text-align:center;color:var(--muted);padding:24px;">无符合筛选条件的个股</td></tr>`;
  }

  const dimCell = (k) => {
    const d = filtered.length && filtered[0].dims6.find(x => x.key === k);
    return '';
  };
  filtered.forEach(r => {
    const fitCls = r.tierKey === 'core' ? 'tg-green' : r.tierKey === 'watch' ? 'tg-mid' : 'tg-extreme';
    const bCls = r.barrier === '极高' ? 'tg-extreme' : r.barrier === '高' ? 'tg-high' : 'tg-mid';
    // 迷你六维 bar
    let miniBar = '<div style="display:flex;gap:1px;height:8px;border-radius:2px;overflow:hidden;width:120px;background:var(--card2);">';
    const order = ['durability','visibility','policy','supply','valuation','barrier'];
    order.forEach(k => {
      const d = r.dims6.find(x => x.key === k);
      const sc = d ? d.score : 0;
      const c = sc >= 4 ? 'var(--green)' : sc >= 3 ? 'var(--barrier-high)' : sc >= 2 ? 'var(--barrier-mid)' : 'var(--red)';
      const w = Math.max(8, sc * 4); // 1→8, 2→8(min), 3→12, 4→16, 5→20, weight 视觉感
      miniBar += `<div title="${k}=${sc}/5" style="flex:1;background:${c};"></div>`;
    });
    miniBar += '</div>';
    h += `<tr>`;
    h += `<td class="s-code" style="cursor:pointer;" onclick="window.location.hash='${r.primaryChainId}?stock=${r.code}'" title="跳到 ${r.chains.split(' / ')[0]} 详细页并定位此股">${r.code}</td>`;
    h += `<td class="s-name">${r.name}${r.inconsistent?' <span style="color:var(--red);font-size:10px;cursor:help;" title="此股在多个赛道中 dims6 不一致">⚠️跨链不一致</span>':''}</td>`;
    h += `<td style="font-size:12px;">${r.chains}</td>`;
    h += `<td style="font-size:12px;">${r.segs}</td>`;
    h += `<td style="font-family:monospace;font-weight:700;"><span style="color:var(--accent);font-size:15px;">${r.fit.score}</span><span style="color:var(--muted);font-size:10px;">/100</span> <span class="tag ${fitCls}" style="font-size:10px;">${r.fit.tier}</span>${r.fit.risk?' <span style="color:var(--red);font-size:10px;" title="安全垫不足（估值或壁垒≤1）已封顶 60">⚠</span>':''}</td>`;
    h += `<td style="text-align:center;"><span class="tag ${bCls}" style="font-size:10px;">${r.barrier}</span></td>`;
    ['durability','visibility','valuation','barrier'].forEach(k => {
      const d = r.dims6.find(x => x.key === k);
      const sc = d ? d.score : 0;
      const c = sc >= 4 ? 'var(--green)' : sc >= 3 ? 'var(--barrier-high)' : sc >= 2 ? 'var(--barrier-mid)' : 'var(--red)';
      h += `<td style="text-align:center;color:${c};font-weight:600;font-family:monospace;">${sc}</td>`;
    });
    h += `<td>${miniBar}</td>`;
    h += `</tr>`;
  });

  h += `</tbody></table></div>`;
  h += `<div class="highlight-box" style="margin-top:14px;font-size:12px;">💡 <strong>怎么读：</strong>点击代码列跳到所属赛道并定位此股 · 点列头切换排序 · 顶部按赛道/壁垒档/分档筛选 · tier 阈值：🟢 综合 ≥75 / 🟡 ≥55 / 🔴 <55 · 跨链重复票只占一行（如联瑞新材在 PCB+HBM 都有 dims6 仍只一行）· ⚠️"跨链不一致"=此股在不同链的 dims6 JSON 不完全相同 · ⚠安全垫不足=估值或壁垒 ≤1（自动封顶 60）。<br>📌 跨链合并规则：同 code 同链同环节视为同一记录（去 segments/midstream 重复登记），但跨链 dims6 不同时行末标 ⚠️"跨链不一致"。</div>`;
  h += `</div>`;

  container.innerHTML = h;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.chain === 'arena'));
}

// ==================== 路由分发（升级四） ====================
function route() {
  const raw = (window.location.hash || '').replace('#', '') || 'pcb';
  // ★ 升级 F1：支持 ?stock=XXXXX 跳转定位个股（个股榜点击代码列 → 跳所属链并定位此股）
  const [hashId, queryStr] = raw.split('?');
  _pendingStockScroll = (queryStr && new URLSearchParams(queryStr).get('stock')) || null;
  if (hashId === 'cards')  return renderCards();
  if (hashId === 'trades') return renderTrades();   // ★ 升级五
  if (hashId === 'arena')  return renderArena();    // ★ 升级九 STEP 3
  return switchChain(CHAINS[hashId] ? hashId : 'pcb');
}

// ===== 升级八 Step 2：侧栏菜单折叠 =====
function toggleSidebarChains() {
  const container = document.getElementById('chain-collapsed');
  const toggle = document.getElementById('chain-toggle');
  if (!container || !toggle) return;
  const willCollapse = !container.classList.contains('collapsed');
  container.classList.toggle('collapsed', willCollapse);
  toggle.textContent = willCollapse ? '▶ 更多赛道 (8)' : '▼ 更多赛道 (8)';
  LS.set(LS_KEYS.sidebarCollapsed, !willCollapse);
}

(function initSidebarCollapse() {
  const container = document.getElementById('chain-collapsed');
  const toggle = document.getElementById('chain-toggle');
  if (!container || !toggle) return;
  const collapsed = LS.get(LS_KEYS.sidebarCollapsed, true) !== false;
  container.classList.toggle('collapsed', collapsed);
  toggle.textContent = collapsed ? '▶ 更多赛道 (8)' : '▼ 更多赛道 (8)';
})();

// ============================================================
// ★ 升级十一 · 侧栏拖拽调整顺序 + 置顶
// ============================================================
// 持久化键：LS_KEYS.sidebarOrder(mySidebarOrder) 存 [code1,code2,...] 用户排序后的 nav-item code 列表
//           LS_KEYS.sidebarPinned(mySidebarPinned) 存 [code1,code2,...] 置顶的 code 列表
// 约束：分隔行(无 data-chain)、nav-toggle、pinned-section、折叠容器本身 不可拖
//       折叠容器内 8 项只允许在折叠容器内重排(同 parent 拖拽,不跨容器)
function loadSidebarOrder() { return LS.get(LS_KEYS.sidebarOrder, null); }
function saveSidebarOrder(arr) { LS.set(LS_KEYS.sidebarOrder, arr); }
function loadSidebarPinned() { return LS.get(LS_KEYS.sidebarPinned, []); }
function saveSidebarPinned(arr) { LS.set(LS_KEYS.sidebarPinned, arr); }

// 持久化当前 nav-list 顺序(按 DOM 现状,跨容器分别提取)
function persistSidebarOrder() {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  // 收集所有 .nav-item[data-chain] 的 code 序列(按当前 DOM 顺序)
  const codes = Array.from(navList.querySelectorAll('.nav-item[data-chain]')).map(n => n.dataset.chain);
  saveSidebarOrder(codes);
}

// 应用 LS 中保存的顺序：按 parent 分组,在每组内按 saved 顺序重排(同 parent 内)
function applySidebarOrder() {
  const navList = document.getElementById('nav-list');
  if (!navList) return;
  const saved = loadSidebarOrder();
  if (!saved || !Array.isArray(saved) || saved.length === 0) return;
  // 按 parent(直接父节点)分组
  const groups = new Map();
  navList.querySelectorAll('.nav-item[data-chain]').forEach(n => {
    const parent = n.parentNode;
    if (!groups.has(parent)) groups.set(parent, new Map());
    groups.get(parent).set(n.dataset.chain, n);
  });
  // 按 saved 顺序重排每个 parent 内的子节点
  groups.forEach((codeMap, parent) => {
    const fragment = document.createDocumentFragment();
    const seenInParent = new Set();
    saved.forEach(code => {
      const item = codeMap.get(code);
      if (item && item.parentNode === parent) {
        fragment.appendChild(item);
        seenInParent.add(code);
      }
    });
    // 剩余未在 saved 中的(新加的 custom 赛道等),append 到末尾
    codeMap.forEach((item, code) => {
      if (!seenInParent.has(code)) fragment.appendChild(item);
    });
    parent.appendChild(fragment);
  });
}

// 置顶切换
function togglePin(code) {
  let pinned = loadSidebarPinned();
  if (!Array.isArray(pinned)) pinned = [];   // 防御：LS 被外部弄成 null 时不抛 TypeError
  if (pinned.includes(code)) {
    pinned = pinned.filter(c => c !== code);
  } else {
    pinned.push(code);
  }
  saveSidebarPinned(pinned);
  applySidebarPinned();
}

// 应用置顶：diff 模式 + 归位重排
// 设计要点：
//   - 每条 nav-item 在 attachToNavItem 时记下 data-original-parent-id + data-original-sibling-codes
//   - 取消置顶的项：先 appendChild 回原 parent 末尾(简单稳定)
//   - 然后用"原兄弟列表"找锚点 + insertBefore 把该项挪回原位置
//   - 用 children 数组手动遍历找锚点(避免 querySelector 边角)
//   - 新置顶的项：appendChild 到 #pinned-section
function applySidebarPinned() {
  const navList = document.getElementById('nav-list');
  const pinnedSection = document.getElementById('pinned-section');
  if (!navList || !pinnedSection) return;

  const pinnedRaw = loadSidebarPinned();
  const pinnedList = Array.isArray(pinnedRaw) ? pinnedRaw : [];

  // 1) 取消置顶的项:appendChild 到原 parent 末尾(简单稳定) + 用 children 数组找锚点挪回原位置
  Array.from(pinnedSection.querySelectorAll('.nav-item[data-chain]')).forEach(item => {
    if (pinnedList.includes(item.dataset.chain)) return;
    const origParentId = item.dataset.originalParentId;
    const origParent = (origParentId && origParentId !== 'pinned-section') ? document.getElementById(origParentId) : null;
    const targetParent = origParent || navList;
    // 先 appendChild 到 targetParent 末尾(简单稳定)
    targetParent.appendChild(item);
    // 然后用原兄弟列表找锚点,挪回原位置
    const origCodes = (item.dataset.originalSiblingCodes || '').split(',').filter(Boolean);
    const cIdx = origCodes.indexOf(item.dataset.chain);
    let anchor = null;
    if (cIdx > 0) {
      // 从 c 之前往前往后找第一个还在 targetParent 内的 .nav-item[data-chain] 作为锚点
      for (let i = cIdx - 1; i >= 0; i--) {
        const targetCode = origCodes[i];
        // 遍历 targetParent.children 找 targetCode(避免 querySelector 边角)
        for (let j = 0; j < targetParent.children.length; j++) {
          const ch = targetParent.children[j];
          if (ch === item) continue;  // 跳过自己
          if (ch.dataset && ch.dataset.chain === targetCode) {
            anchor = ch;
            break;
          }
        }
        if (anchor) break;
      }
    }
    if (anchor) {
      // 把 item 挪到 anchor 之后(找 anchor 后面那个兄弟作为 refChild)
      let refNode = null;
      for (let k = 0; k < targetParent.children.length; k++) {
        if (targetParent.children[k] === anchor) {
          refNode = targetParent.children[k + 1] || null;
          break;
        }
      }
      targetParent.insertBefore(item, refNode);  // refNode 为 null 时 = appendChild(末尾)
    } else {
      // fallback:item 是 origCodes 列表中第一项 / 前面所有项都被置顶走了
      // → 找 targetParent 内"非 item 的第一个 .nav-item[data-chain]",把 item 插到它之前
      let firstNavItem = null;
      for (let j = 0; j < targetParent.children.length; j++) {
        const ch = targetParent.children[j];
        if (ch === item) continue;
        if (ch.classList && ch.classList.contains('nav-item') && ch.dataset && ch.dataset.chain) {
          firstNavItem = ch;
          break;
        }
      }
      if (firstNavItem) {
        targetParent.insertBefore(item, firstNavItem);
      }
      // 找不到 firstNavItem(targetParent 内除了 item 没其他 nav-item)→ item 留在末尾,可接受
    }
    item.classList.remove('pinned');
  });

  // 2) 新置顶的项(在 LS 中但不在 #pinned-section 中)→ 挪到 #pinned-section
  pinnedList.forEach(code => {
    if (pinnedSection.querySelector(`.nav-item[data-chain="${code}"]`)) return;  // 已经在
    const item = navList.querySelector(`.nav-item[data-chain="${code}"]`);
    if (item) {
      item.classList.add('pinned');
      pinnedSection.appendChild(item);
    }
  });

  // 3) 显示/隐藏
  pinnedSection.classList.toggle('has-pinned', pinnedList.length > 0);
}

// === HTML5 拖拽（原生,无外部库） ===
let _draggedItem = null;
function onDragStart(e) {
  if (!this.dataset.chain) { e.preventDefault(); return; }  // 分隔行/无 data-chain 不可拖
  _draggedItem = this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', ''); } catch(_) {}  // firefox 兼容
}
function onDragEnd(e) {
  this.classList.remove('dragging');
  // 清除所有 drag-over 标记
  document.querySelectorAll('.drag-over-top, .drag-over-bottom').forEach(n => n.classList.remove('drag-over-top', 'drag-over-bottom'));
  if (_draggedItem) {
    persistSidebarOrder();  // drop 后保存新顺序
    _draggedItem = null;
  }
}
function onDragOver(e) {
  if (!_draggedItem || _draggedItem === this) return;
  // 跨 parent 允许拖拽(用户需求:折叠容器内项可拖到主区,主区项可拖到折叠容器)
  // 但拒绝拖到 #pinned-section / #chain-toggle / 分隔行(它们不该接收被拖项)
  if (this.parentNode && (this.parentNode.id === 'pinned-section' || this.classList.contains('nav-toggle'))) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // 标记上/下插入位置(根据光标在目标项的上/下半)
  const rect = this.getBoundingClientRect();
  const isTop = (e.clientY - rect.top) < rect.height / 2;
  this.classList.toggle('drag-over-top', isTop);
  this.classList.toggle('drag-over-bottom', !isTop);
}
function onDragLeave(e) {
  this.classList.remove('drag-over-top', 'drag-over-bottom');
}
function onDrop(e) {
  if (!_draggedItem || _draggedItem === this) return;
  if (this.parentNode && (this.parentNode.id === 'pinned-section' || this.classList.contains('nav-toggle'))) return;
  e.preventDefault();
  e.stopPropagation();
  const isTop = this.classList.contains('drag-over-top');
  this.classList.remove('drag-over-top', 'drag-over-bottom');
  // 跨 parent 拖拽:用 this.parentNode.insertBefore,把 _draggedItem 插入到 this 的位置
  this.parentNode.insertBefore(_draggedItem, isTop ? this : this.nextSibling);
  // 跨 parent 拖拽后,该项的 originalParentId 仍然记的是初始 parent — 这会导致"取消置顶归位"回到初始 parent
  // 实际 OK:用户拖拽后再取消置顶,仍然回到初始 parent(而不是当前 parent),这是用户能接受的简单语义
  // 如果需要"取消置顶回到拖拽后的 parent",可加 LS 记录"用户拖拽后新 parent"——但会复杂化,先不做
}

// 初始化拖拽 + 置顶按钮（每条 nav-item 一次性绑定,后续 insertCustomNavItem 由 MutationObserver 覆盖）
function initSidebarDnd() {
  const navList = document.getElementById('nav-list');
  if (!navList) return;

  function attachToNavItem(item) {
    if (item.dataset.dndReady === '1') return;
    item.dataset.dndReady = '1';
    const code = item.dataset.chain;
    if (!code) return;  // 分隔行无 data-chain
    // ★ 记录原 parent + 原 parent 内的兄弟 code 列表(供取消置顶时精准归位到原位置)
    if (!item.dataset.originalParentId) {
      const parent = item.parentNode;
      item.dataset.originalParentId = parent.id || 'navList';
      // 记原 parent 内所有 .nav-item[data-chain] 的 code 列表(逗号分隔)
      const sibCodes = Array.from(parent.querySelectorAll(':scope > .nav-item[data-chain]')).map(s => s.dataset.chain);
      item.dataset.originalSiblingCodes = sibCodes.join(',');
    }
    // 1) 追加 📌 pin 按钮
    if (!item.querySelector('.pin-btn')) {
      const pinBtn = document.createElement('button');
      pinBtn.className = 'pin-btn';
      pinBtn.textContent = '📌';
      pinBtn.title = '置顶/取消置顶';
      pinBtn.onclick = (e) => { e.stopPropagation(); togglePin(code); };
      item.appendChild(pinBtn);
    }
    // 2) nav-toggle 不可拖(它是折叠触发器)
    if (item.classList.contains('nav-toggle')) return;
    // 3) 绑 draggable + 5 个拖拽事件
    item.setAttribute('draggable', 'true');
    item.addEventListener('dragstart', onDragStart);
    item.addEventListener('dragend', onDragEnd);
    item.addEventListener('dragover', onDragOver);
    item.addEventListener('dragleave', onDragLeave);
    item.addEventListener('drop', onDrop);
  }

  // 初始绑定所有现有 nav-item
  navList.querySelectorAll('.nav-item[data-chain]').forEach(attachToNavItem);

  // 监听 nav-list 的 DOM 变化(让后续 insertCustomNavItem 自动绑定)
  const observer = new MutationObserver(muts => {
    muts.forEach(m => m.addedNodes.forEach(n => {
      if (n.nodeType === 1 && n.classList && n.classList.contains('nav-item') && n.dataset.chain) {
        attachToNavItem(n);
      }
    }));
  });
  observer.observe(navList, { childList: true, subtree: true });
}

// 初始化入口(应用 LS 中保存的顺序+置顶,然后启动拖拽)

})();

function copyRefreshFromModal(chainId) {
  const d = CHAINS[chainId];
  if (!d) return;
  const ta = document.getElementById('refresh-prompt-text');
  if (!ta) return;
  const text = ta.value;

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(
      () => { showToast('已复制，去 CC 粘贴'); closeRefreshModal(); },
      () => { ta.select(); showToast('clipboard 不可用，已选中文本，请 Ctrl+C 手动复制'); }
    );
  } else {
    // file:// 等 clipboard 不可用场景，回退为自动选中
    ta.select();
    ta.setSelectionRange(0, text.length);
    showToast('clipboard 不可用，已选中文本，请 Ctrl+C 手动复制');
  }
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.className = 'toast';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function init() {
  loadAllCustomChains();   // ★ 升级六：复活 localStorage 里的自定义赛道
  route();
  renderChangelog();
}
window.addEventListener('DOMContentLoaded', init);
window.addEventListener('hashchange', () => {

  if (hash !== currentChain) route();
});
